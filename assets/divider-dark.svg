<svg viewBox="0 0 900 28" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a0a0c"/>
      <stop offset="50%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#0a0a0c"/>
    </linearGradient>
    <linearGradient id="gl" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#caa84d" stop-opacity="0"/>
      <stop offset="50%" stop-color="#caa84d" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#caa84d" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="goldD" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a9863a"/>
      <stop offset="50%" stop-color="#f5e3a3"/>
      <stop offset="100%" stop-color="#a9863a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    @keyframes travel{0%{transform:translateX(-250px)}100%{transform:translateX(250px)}}
    @keyframes pulse{0%,100%{opacity:0.3}50%{opacity:0.9}}
    @keyframes spin{0%{transform:rotate(45deg)}100%{transform:rotate(405deg)}}
    .tr{animation:travel 4.5s ease-in-out infinite}
    .p{animation:pulse 3s ease-in-out infinite}
    .sp{animation:spin 12s linear infinite;transform-origin:450px 14px}
  </style>
  <rect width="900" height="28" fill="url(#bg)"/>
  <line x1="170" y1="14" x2="700" y2="14" stroke="url(#gl)" stroke-width="0.5"/>

  <!-- art-deco center ornament -->
  <g transform="translate(450,14)">
    <g class="sp">
      <rect x="-7" y="-7" width="14" height="14" fill="none" stroke="#caa84d" stroke-width="0.4" opacity="0.3"/>
    </g>
    <rect x="-3.2" y="-3.2" width="6.4" height="6.4" fill="url(#goldD)" opacity="0.85" transform="rotate(45)" class="p" filter="url(#glow)"/>
  </g>

  <!-- deco wings -->
  <g stroke="url(#goldD)" stroke-width="0.7" opacity="0.5" fill="none">
    <path d="M410 14 h-26 l-6 -4 M410 14 h-26 l-6 4"/>
    <path d="M490 14 h26 l6 -4 M490 14 h26 l6 4"/>
  </g>
  <circle cx="372" cy="14" r="1.3" fill="#caa84d" opacity="0.55" class="p"/>
  <circle cx="528" cy="14" r="1.3" fill="#caa84d" opacity="0.55" class="p"/>

  <!-- traveling pulse -->
  <g class="tr">
    <circle cx="450" cy="14" r="1.6" fill="#f5e3a3" filter="url(#glow)"/>
  </g>
</svg>
