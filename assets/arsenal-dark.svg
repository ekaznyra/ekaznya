<svg viewBox="0 0 900 210" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgRad" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#10161f"/>
      <stop offset="60%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#010409"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    @keyframes pop{0%{opacity:0;transform:scale(.85)}100%{opacity:1;transform:scale(1)}}
    @keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}
    .chip{opacity:0;animation:pop .45s cubic-bezier(.16,1,.3,1) forwards;transform-box:fill-box;transform-origin:center}
    .p{animation:pulse 3s ease-in-out infinite}
    .fs{font-family:Arial,"Segoe UI",Helvetica,sans-serif}
    .fm{font-family:"Courier New",Consolas,monospace}
  </style>

  <rect width="900" height="210" fill="url(#bgRad)"/>

  <!-- Section label -->
  <text x="60" y="30" class="fm" font-size="10" fill="#484f58" letter-spacing="4">// ARSENAL</text>
  <line x1="60" y1="40" x2="840" y2="40" stroke="#21262d" stroke-width="0.5"/>

  <!-- Row 1: Forensics & IR -->
  <text x="60" y="68" class="fm" font-size="9" fill="#d4af37" letter-spacing="2">forensics_ir</text>
  <g>
    <g class="chip" style="animation-delay:.2s"><rect x="60" y="78" width="100" height="26" rx="4" fill="#d4af3710" stroke="#d4af37" stroke-width="0.5" opacity="0.7"/><text x="110" y="95" text-anchor="middle" class="fm" font-size="10" fill="#d4af37">Volatility</text></g>
    <g class="chip" style="animation-delay:.28s"><rect x="170" y="78" width="92" height="26" rx="4" fill="#d4af3710" stroke="#d4af37" stroke-width="0.5" opacity="0.7"/><text x="216" y="95" text-anchor="middle" class="fm" font-size="10" fill="#d4af37">Autopsy</text></g>
    <g class="chip" style="animation-delay:.36s"><rect x="272" y="78" width="78" height="26" rx="4" fill="#d4af3710" stroke="#d4af37" stroke-width="0.5" opacity="0.7"/><text x="311" y="95" text-anchor="middle" class="fm" font-size="10" fill="#d4af37">Velociraptor</text></g>
    <g class="chip" style="animation-delay:.44s"><rect x="360" y="78" width="74" height="26" rx="4" fill="#d4af3710" stroke="#d4af37" stroke-width="0.5" opacity="0.7"/><text x="397" y="95" text-anchor="middle" class="fm" font-size="10" fill="#d4af37">Wireshark</text></g>
    <g class="chip" style="animation-delay:.52s"><rect x="444" y="78" width="60" height="26" rx="4" fill="#d4af3710" stroke="#d4af37" stroke-width="0.5" opacity="0.7"/><text x="474" y="95" text-anchor="middle" class="fm" font-size="10" fill="#d4af37">YARA</text></g>
    <g class="chip" style="animation-delay:.6s"><rect x="514" y="78" width="62" height="26" rx="4" fill="#d4af3710" stroke="#d4af37" stroke-width="0.5" opacity="0.7"/><text x="545" y="95" text-anchor="middle" class="fm" font-size="10" fill="#d4af37">Sigma</text></g>
  </g>

  <!-- Row 2: Detection & SIEM -->
  <text x="60" y="130" class="fm" font-size="9" fill="#8b949e" letter-spacing="2">detection_siem</text>
  <g>
    <g class="chip" style="animation-delay:.5s"><rect x="60" y="140" width="74" height="26" rx="4" fill="none" stroke="#30363d" stroke-width="0.5"/><text x="97" y="157" text-anchor="middle" class="fm" font-size="10" fill="#c9d1d9">Splunk</text></g>
    <g class="chip" style="animation-delay:.58s"><rect x="144" y="140" width="100" height="26" rx="4" fill="none" stroke="#30363d" stroke-width="0.5"/><text x="194" y="157" text-anchor="middle" class="fm" font-size="10" fill="#c9d1d9">Elastic / ELK</text></g>
    <g class="chip" style="animation-delay:.66s"><rect x="254" y="140" width="80" height="26" rx="4" fill="none" stroke="#30363d" stroke-width="0.5"/><text x="294" y="157" text-anchor="middle" class="fm" font-size="10" fill="#c9d1d9">Suricata</text></g>
    <g class="chip" style="animation-delay:.74s"><rect x="344" y="140" width="62" height="26" rx="4" fill="none" stroke="#30363d" stroke-width="0.5"/><text x="375" y="157" text-anchor="middle" class="fm" font-size="10" fill="#c9d1d9">Zeek</text></g>
    <g class="chip" style="animation-delay:.82s"><rect x="416" y="140" width="84" height="26" rx="4" fill="none" stroke="#30363d" stroke-width="0.5"/><text x="458" y="157" text-anchor="middle" class="fm" font-size="10" fill="#c9d1d9">MITRE ATT&amp;CK</text></g>
  </g>

  <!-- Row 3: Languages / Platforms -->
  <text x="60" y="190" class="fm" font-size="9" fill="#8b949e" letter-spacing="2">lang_platform</text>
  <g>
    <g class="chip" style="animation-delay:.8s"><circle cx="148" cy="186" r="2" fill="#8b949e" class="p"/><text x="160" y="190" class="fm" font-size="10" fill="#8b949e">Python</text></g>
    <g class="chip" style="animation-delay:.88s"><circle cx="226" cy="186" r="2" fill="#8b949e" class="p"/><text x="238" y="190" class="fm" font-size="10" fill="#8b949e">Bash</text></g>
    <g class="chip" style="animation-delay:.96s"><circle cx="296" cy="186" r="2" fill="#8b949e" class="p"/><text x="308" y="190" class="fm" font-size="10" fill="#8b949e">PowerShell</text></g>
    <g class="chip" style="animation-delay:1.04s"><circle cx="400" cy="186" r="2" fill="#8b949e" class="p"/><text x="412" y="190" class="fm" font-size="10" fill="#8b949e">Linux</text></g>
    <g class="chip" style="animation-delay:1.12s"><circle cx="470" cy="186" r="2" fill="#8b949e" class="p"/><text x="482" y="190" class="fm" font-size="10" fill="#8b949e">Docker</text></g>
    <g class="chip" style="animation-delay:1.2s"><circle cx="548" cy="186" r="2" fill="#8b949e" class="p"/><text x="560" y="190" class="fm" font-size="10" fill="#8b949e">Git</text></g>
  </g>
</svg>
