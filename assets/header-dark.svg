<svg viewBox="0 0 900 330" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgRad" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#11171f"/>
      <stop offset="55%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#010409"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0"/>
      <stop offset="20%" stop-color="#d4af37"/>
      <stop offset="50%" stop-color="#f4d978"/>
      <stop offset="80%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="50%" stop-color="#f4d978"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#b9c2cd"/>
    </linearGradient>
    <linearGradient id="edge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0"/>
      <stop offset="50%" stop-color="#d4af37" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glowSoft"><feGaussianBlur stdDeviation="1.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <style>
    @keyframes scanDown{0%{transform:translateY(-330px)}100%{transform:translateY(330px)}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    @keyframes rise{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{opacity:0.3}50%{opacity:1}}
    @keyframes twinkle{0%,100%{opacity:0.1}50%{opacity:0.6}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    @keyframes live{0%{transform:scale(1);opacity:.9}70%{transform:scale(2.6);opacity:0}100%{opacity:0}}
    @keyframes drawW{0%{width:0}100%{width:300px}}
    @keyframes sweep{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}

    .scan{animation:scanDown 6s linear infinite}
    .cursor{animation:blink .8s step-end infinite}
    .r1{opacity:0;animation:rise .7s ease-out .2s forwards}
    .r2{opacity:0;animation:rise .7s ease-out .9s forwards}
    .r3{opacity:0;animation:rise .7s ease-out 1.15s forwards}
    .r4{opacity:0;animation:rise .7s ease-out 1.4s forwards}
    .r5{opacity:0;animation:rise .7s ease-out 1.65s forwards}
    .p1{animation:pulse 3s infinite ease-in-out}
    .p2{animation:pulse 4s infinite ease-in-out 1s}
    .tw{animation:twinkle 4s infinite ease-in-out}
    .tw2{animation:twinkle 5s infinite ease-in-out 1.5s}
    .tw3{animation:twinkle 3.4s infinite ease-in-out 2.4s}
    .fl{animation:float 7s ease-in-out infinite}
    .live{animation:live 2.4s ease-out infinite;transform-box:fill-box;transform-origin:center}
    .sweep{animation:sweep 5s linear infinite;transform-origin:450px 150px}
    .fs{font-family:Arial,"Segoe UI",Helvetica,sans-serif}
    .fm{font-family:"Courier New",Consolas,monospace}
  </style>

  <rect width="900" height="330" fill="url(#bgRad)"/>
  <ellipse cx="450" cy="150" rx="360" ry="130" fill="url(#halo)"/>

  <!-- scan line -->
  <rect width="900" height="80" fill="#d4af37" opacity="0.05" class="scan"/>

  <!-- subtle grid -->
  <g stroke="#21262d" stroke-width="0.3" opacity="0.25">
    <line x1="0" y1="66" x2="900" y2="66"/>
    <line x1="0" y1="264" x2="900" y2="264"/>
  </g>

  <!-- symmetric constellation (both sides, mirrored feel) -->
  <g fill="#d4af37">
    <circle cx="90" cy="60" r="1.4" class="tw" opacity=".3"/>
    <circle cx="150" cy="90" r="1" class="tw2" opacity=".22"/>
    <circle cx="60" cy="120" r="1.2" class="tw3" opacity=".25"/>
    <circle cx="120" cy="250" r="1.2" class="tw2" opacity=".22"/>
    <circle cx="70" cy="220" r="1" class="tw" opacity=".2"/>
    <circle cx="810" cy="60" r="1.4" class="tw" opacity=".3"/>
    <circle cx="750" cy="90" r="1" class="tw2" opacity=".22"/>
    <circle cx="840" cy="120" r="1.2" class="tw3" opacity=".25"/>
    <circle cx="780" cy="250" r="1.2" class="tw2" opacity=".22"/>
    <circle cx="830" cy="220" r="1" class="tw" opacity=".2"/>
  </g>
  <g stroke="#d4af37" stroke-width="0.3" opacity="0.07">
    <line x1="90" y1="60" x2="150" y2="90"/><line x1="150" y1="90" x2="60" y2="120"/>
    <line x1="810" y1="60" x2="750" y2="90"/><line x1="750" y1="90" x2="840" y2="120"/>
  </g>

  <!-- faint centered radar rings behind name (symmetric) -->
  <g opacity="0.5">
    <circle cx="450" cy="150" r="150" fill="none" stroke="#d4af37" stroke-width="0.3" opacity="0.06"/>
    <circle cx="450" cy="150" r="200" fill="none" stroke="#d4af37" stroke-width="0.25" opacity="0.04"/>
    <g class="sweep"><line x1="450" y1="150" x2="450" y2="0" stroke="#d4af37" stroke-width="0.4" opacity="0.05"/></g>
  </g>

  <!-- symmetric corner brackets -->
  <g stroke="#d4af37" stroke-width="1" fill="none" opacity="0.35">
    <polyline points="40,52 40,40 52,40"/>
    <polyline points="860,40 872,40 872,52"/>
    <polyline points="40,278 40,290 52,290"/>
    <polyline points="860,290 872,290 872,278"/>
  </g>

  <!-- terminal label (centered) -->
  <g class="r1">
    <text x="450" y="58" text-anchor="middle" class="fm" font-size="11" fill="#6e7681" letter-spacing="3">user@sec:~$ whoami</text>
  </g>

  <!-- NAME (centered) -->
  <g class="r2">
    <text x="450" y="148" text-anchor="middle" class="fs" font-weight="300" font-size="70" fill="url(#nameGrad)" letter-spacing="6">ekaznyra</text>
    <rect x="660" y="118" width="6" height="40" fill="#d4af37" opacity="0.7" class="cursor"/>
  </g>

  <!-- centered underline (draws out) -->
  <g class="r3">
    <rect x="300" y="168" height="2.4" rx="1" fill="url(#accent)" filter="url(#glow)">
      <animate attributeName="width" from="0" to="300" dur="0.9s" begin="1.15s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.16 1 0.3 1"/>
    </rect>
  </g>

  <!-- Vietnamese name with full diacritics (centered) -->
  <g class="r3">
    <text x="450" y="202" text-anchor="middle" class="fs" font-weight="700" font-size="27" fill="url(#goldText)" letter-spacing="4">NGUYỄN NGỌC ANH TÚ</text>
  </g>

  <!-- role (centered) -->
  <g class="r4">
    <text x="450" y="228" text-anchor="middle" class="fm" font-size="11.5" fill="#8b949e" letter-spacing="2">Cybersecurity Researcher · DFIR Operative</text>
  </g>

  <!-- tag chips (centered, symmetric) -->
  <g class="r5">
    <g>
      <rect x="300" y="244" width="58" height="20" rx="4" fill="#d4af3712" stroke="#d4af37" stroke-width="0.7" opacity="0.8"/>
      <text x="329" y="257" text-anchor="middle" class="fm" font-size="8.5" fill="#d4af37" letter-spacing="1">DFIR</text>
    </g>
    <g>
      <rect x="364" y="244" width="96" height="20" rx="4" fill="none" stroke="#30363d"/>
      <text x="412" y="257" text-anchor="middle" class="fm" font-size="8.5" fill="#9ba3ae" letter-spacing="1">THREAT HUNT</text>
    </g>
    <g>
      <rect x="466" y="244" width="90" height="20" rx="4" fill="none" stroke="#30363d"/>
      <text x="511" y="257" text-anchor="middle" class="fm" font-size="8.5" fill="#9ba3ae" letter-spacing="1">DETECTION</text>
    </g>
    <g>
      <rect x="562" y="244" width="58" height="20" rx="4" fill="none" stroke="#30363d"/>
      <text x="591" y="257" text-anchor="middle" class="fm" font-size="8.5" fill="#9ba3ae" letter-spacing="1">SIGMA</text>
    </g>
  </g>

  <!-- status (centered) -->
  <g class="r5">
    <circle cx="392" cy="287" r="3.4" fill="#3fb950"/>
    <circle cx="392" cy="287" r="3.4" fill="#3fb950" class="live"/>
    <text x="404" y="291" class="fm" font-size="9" fill="#3fb950" letter-spacing="1.5">OPEN TO COLLABORATE</text>
  </g>

  <!-- bottom edge line -->
  <rect x="0" y="328" width="900" height="2" fill="url(#edge)"/>

  <!-- floating particles -->
  <circle cx="220" cy="80" r="1" fill="#d4af37" opacity="0.25" class="fl"/>
  <circle cx="680" cy="100" r="0.9" fill="#d4af37" opacity="0.2" class="fl" style="animation-delay:2s"/>
  <circle cx="600" cy="300" r="1" fill="#8b949e" opacity="0.12" class="fl" style="animation-delay:4s"/>
</svg>
