<svg viewBox="0 0 900 330" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgRad" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#14110a"/>
      <stop offset="42%" stop-color="#0a0a0c"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="vign" cx="50%" cy="50%" r="62%">
      <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.85"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#caa84d" stop-opacity="0"/>
      <stop offset="20%" stop-color="#caa84d"/>
      <stop offset="50%" stop-color="#f5e3a3"/>
      <stop offset="80%" stop-color="#caa84d"/>
      <stop offset="100%" stop-color="#caa84d" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a9863a"/>
      <stop offset="50%" stop-color="#f5e3a3"/>
      <stop offset="100%" stop-color="#a9863a"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbf7ec"/>
      <stop offset="100%" stop-color="#9a958a"/>
    </linearGradient>
    <linearGradient id="shine" gradientUnits="userSpaceOnUse" x1="350" y1="0" x2="460" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#fff7d6" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-380 0" to="380 0" dur="4.8s" begin="1.7s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="edge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#caa84d" stop-opacity="0"/>
      <stop offset="50%" stop-color="#caa84d" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#caa84d" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#caa84d" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#caa84d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mist" cx="50%" cy="100%" r="75%">
      <stop offset="0%" stop-color="#caa84d" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#caa84d" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glowSoft"><feGaussianBlur stdDeviation="1.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="n"/><feColorMatrix in="n" type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer></filter>
    <clipPath id="frame"><rect width="900" height="330"/></clipPath>
  </defs>
  <style>
    @keyframes scanDown{0%{transform:translateY(-330px)}100%{transform:translateY(330px)}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    @keyframes rise{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{opacity:0.3}50%{opacity:1}}
    @keyframes twinkle{0%,100%{opacity:0.08}50%{opacity:0.55}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    @keyframes live{0%{transform:scale(1);opacity:.9}70%{transform:scale(2.6);opacity:0}100%{opacity:0}}
    @keyframes sweep{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
    @keyframes drift{0%{opacity:0.04}50%{opacity:0.1}100%{opacity:0.04}}
    @keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
    @keyframes spinRev{0%{transform:rotate(360deg)}100%{transform:rotate(0)}}
    @keyframes rain{0%{transform:translateY(-120px)}100%{transform:translateY(330px)}}
    @keyframes breathe{0%,100%{opacity:0.18}50%{opacity:0.5}}

    .scan{animation:scanDown 7s linear infinite}
    .cursor{animation:blink .9s step-end infinite}
    .r1{opacity:0;animation:rise .7s ease-out .2s forwards}
    .r2{opacity:0;animation:rise .7s ease-out .9s forwards}
    .r3{opacity:0;animation:rise .7s ease-out 1.15s forwards}
    .r4{opacity:0;animation:rise .7s ease-out 1.4s forwards}
    .r5{opacity:0;animation:rise .7s ease-out 1.65s forwards}
    .tw{animation:twinkle 4s infinite ease-in-out}
    .tw2{animation:twinkle 5s infinite ease-in-out 1.5s}
    .tw3{animation:twinkle 3.4s infinite ease-in-out 2.4s}
    .fl{animation:float 7s ease-in-out infinite}
    .live{animation:live 2.4s ease-out infinite;transform-box:fill-box;transform-origin:center}
    .sweep{animation:sweep 7s linear infinite;transform-origin:450px 150px}
    .mistA{animation:drift 9s ease-in-out infinite}
    .arc1{animation:spin 26s linear infinite;transform-origin:450px 150px}
    .arc2{animation:spinRev 34s linear infinite;transform-origin:450px 150px}
    .rainCol{animation:rain 5s linear infinite}
    .breathe{animation:breathe 5s ease-in-out infinite}
    .fs{font-family:Georgia,"Times New Roman",serif}
    .fsa{font-family:Arial,"Segoe UI",Helvetica,sans-serif}
    .fm{font-family:"Courier New",Consolas,monospace}
  </style>

  <rect width="900" height="330" fill="url(#bgRad)"/>
  <rect width="900" height="330" fill="url(#mist)" class="mistA"/>
  <ellipse cx="450" cy="150" rx="340" ry="120" fill="url(#halo)"/>

  <!-- scan line -->
  <rect width="900" height="70" fill="#caa84d" opacity="0.035" class="scan"/>

  <!-- cyber digital rain (side zones, mysterious) -->
  <g class="fm" font-size="11" fill="#caa84d" opacity="0.5" clip-path="url(#frame)">
    <g class="rainCol" style="animation-duration:5s">
      <text x="34" y="0" opacity="0.5">1</text><text x="34" y="22" opacity="0.3">0</text><text x="34" y="44" opacity="0.7">1</text><text x="34" y="66" opacity="0.25">1</text><text x="34" y="88" opacity="0.4">0</text>
    </g>
    <g class="rainCol" style="animation-duration:7s;animation-delay:-2s">
      <text x="70" y="0" opacity="0.4">0</text><text x="70" y="22" opacity="0.6">1</text><text x="70" y="44" opacity="0.3">1</text><text x="70" y="66" opacity="0.5">0</text>
    </g>
    <g class="rainCol" style="animation-duration:6s;animation-delay:-3.5s">
      <text x="106" y="0" opacity="0.3">1</text><text x="106" y="22" opacity="0.5">1</text><text x="106" y="44" opacity="0.25">0</text><text x="106" y="66" opacity="0.45">1</text>
    </g>
    <g class="rainCol" style="animation-duration:5.5s;animation-delay:-1s">
      <text x="830" y="0" opacity="0.5">0</text><text x="830" y="22" opacity="0.3">1</text><text x="830" y="44" opacity="0.6">0</text><text x="830" y="66" opacity="0.3">1</text><text x="830" y="88" opacity="0.4">0</text>
    </g>
    <g class="rainCol" style="animation-duration:6.5s;animation-delay:-3s">
      <text x="794" y="0" opacity="0.4">1</text><text x="794" y="22" opacity="0.55">0</text><text x="794" y="44" opacity="0.3">1</text><text x="794" y="66" opacity="0.5">0</text>
    </g>
    <g class="rainCol" style="animation-duration:7.5s;animation-delay:-4.5s">
      <text x="758" y="0" opacity="0.3">0</text><text x="758" y="22" opacity="0.45">1</text><text x="758" y="44" opacity="0.25">1</text><text x="758" y="66" opacity="0.4">0</text>
    </g>
  </g>

  <!-- subtle grid -->
  <g stroke="#1a1a1f" stroke-width="0.3" opacity="0.3">
    <line x1="0" y1="66" x2="900" y2="66"/>
    <line x1="0" y1="264" x2="900" y2="264"/>
  </g>

  <!-- symmetric constellation -->
  <g fill="#caa84d">
    <circle cx="90" cy="60" r="1.4" class="tw" opacity=".3"/>
    <circle cx="150" cy="90" r="1" class="tw2" opacity=".22"/>
    <circle cx="60" cy="120" r="1.2" class="tw3" opacity=".25"/>
    <circle cx="120" cy="250" r="1.2" class="tw2" opacity=".22"/>
    <circle cx="70" cy="220" r="1" class="tw" opacity=".2"/>
    <circle cx="810" cy="60" r="1.4" class="tw" opacity=".3"/>
    <circle cx="750" cy="90" r="1" class="tw2" opacity=".22"/>
    <circle cx="840" cy="120" r="1.2" class="tw3" opacity=".25"/>
    <circle cx="780" cy="250" r="1.2" class="tw2" opacity=".22"/>
    <circle cx="830" cy="220" r="1" class="tw" opacity=".2"/>
  </g>
  <g stroke="#caa84d" stroke-width="0.3" opacity="0.07">
    <line x1="90" y1="60" x2="150" y2="90"/><line x1="150" y1="90" x2="60" y2="120"/>
    <line x1="810" y1="60" x2="750" y2="90"/><line x1="750" y1="90" x2="840" y2="120"/>
  </g>

  <!-- arcane power sigil behind name (cyber + mysterious) -->
  <g opacity="0.5">
    <circle cx="450" cy="150" r="150" fill="none" stroke="#caa84d" stroke-width="0.3" opacity="0.06"/>
    <circle cx="450" cy="150" r="200" fill="none" stroke="#caa84d" stroke-width="0.25" opacity="0.04"/>
    <g class="sweep"><line x1="450" y1="150" x2="450" y2="0" stroke="#caa84d" stroke-width="0.4" opacity="0.05"/></g>
  </g>
  <g class="breathe">
    <!-- outer dashed ring rotating -->
    <g class="arc1">
      <circle cx="450" cy="150" r="128" fill="none" stroke="#caa84d" stroke-width="0.6" stroke-dasharray="2 10" opacity="0.35"/>
      <circle cx="450" cy="150" r="118" fill="none" stroke="#caa84d" stroke-width="0.4" stroke-dasharray="1 18" opacity="0.25"/>
    </g>
    <!-- inner ring + arcane tick marks rotating reverse -->
    <g class="arc2">
      <circle cx="450" cy="150" r="104" fill="none" stroke="#caa84d" stroke-width="0.5" opacity="0.18"/>
      <g stroke="#caa84d" stroke-width="0.6" opacity="0.3">
        <line x1="450" y1="46" x2="450" y2="56"/>
        <line x1="450" y1="244" x2="450" y2="254"/>
        <line x1="346" y1="150" x2="356" y2="150"/>
        <line x1="544" y1="150" x2="554" y2="150"/>
        <line x1="376.5" y1="76.5" x2="383.5" y2="83.5"/>
        <line x1="516.5" y1="216.5" x2="523.5" y2="223.5"/>
        <line x1="523.5" y1="76.5" x2="516.5" y2="83.5"/>
        <line x1="383.5" y1="216.5" x2="376.5" y2="223.5"/>
      </g>
      <!-- triangulated power glyph -->
      <polygon points="450,72 540,200 360,200" fill="none" stroke="#caa84d" stroke-width="0.4" opacity="0.12"/>
      <polygon points="450,228 360,100 540,100" fill="none" stroke="#caa84d" stroke-width="0.4" opacity="0.12"/>
    </g>
  </g>

  <!-- ornate corner flourishes -->
  <g stroke="#caa84d" stroke-width="1" fill="none" opacity="0.4">
    <polyline points="40,52 40,40 52,40"/>
    <polyline points="860,40 872,40 872,52"/>
    <polyline points="40,278 40,290 52,290"/>
    <polyline points="860,290 872,290 872,278"/>
  </g>
  <g stroke="#caa84d" stroke-width="0.5" fill="none" opacity="0.2">
    <path d="M40 64 q10 0 10 -10"/>
    <path d="M860 54 q0 10 10 10"/>
    <path d="M40 266 q10 0 10 10"/>
    <path d="M860 276 q0 -10 10 -10"/>
  </g>

  <!-- hex circuit nodes (cyber detailing) -->
  <g stroke="#caa84d" fill="none" opacity="0.22" stroke-width="0.7">
    <polygon points="150,300 158,304 158,313 150,317 142,313 142,304"/>
    <polygon points="750,300 758,304 758,313 750,317 742,313 742,304"/>
    <path d="M150 300 L150 285 M158 304 L172 297 M742 313 L728 320"/>
    <circle cx="150" cy="285" r="1.4" fill="#caa84d" stroke="none"/>
    <circle cx="172" cy="297" r="1.2" fill="#caa84d" stroke="none"/>
    <circle cx="728" cy="320" r="1.2" fill="#caa84d" stroke="none"/>
  </g>

  <!-- terminal label -->
  <g class="r1">
    <text x="450" y="58" text-anchor="middle" class="fm" font-size="11" fill="#5c574c" letter-spacing="3">user@sec:~$ whoami</text>
  </g>

  <!-- NAME -->
  <g class="r2">
    <text x="450" y="148" text-anchor="middle" class="fsa" font-weight="300" font-size="70" fill="url(#nameGrad)" letter-spacing="6">ekaznyra</text>
    <text x="450" y="148" text-anchor="middle" class="fsa" font-weight="300" font-size="70" fill="url(#shine)" letter-spacing="6">ekaznyra</text>
    <rect x="660" y="118" width="6" height="40" fill="#caa84d" opacity="0.7" class="cursor"/>
  </g>

  <!-- centered underline -->
  <g class="r3">
    <rect x="300" y="168" height="2.4" rx="1" fill="url(#accent)" filter="url(#glow)">
      <animate attributeName="width" from="0" to="300" dur="0.9s" begin="1.15s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.16 1 0.3 1"/>
    </rect>
  </g>

  <!-- Vietnamese name with full diacritics -->
  <g class="r3">
    <text x="450" y="202" text-anchor="middle" class="fs" font-weight="700" font-size="27" fill="url(#goldText)" letter-spacing="4">NGUYỄN NGỌC ANH TÚ</text>
  </g>

  <!-- role -->
  <g class="r4">
    <text x="450" y="228" text-anchor="middle" class="fm" font-size="11.5" fill="#8a8578" letter-spacing="2">Cybersecurity Researcher · DFIR Operative</text>
  </g>

  <!-- tag chips -->
  <g class="r5">
    <g>
      <rect x="300" y="244" width="58" height="20" rx="4" fill="#caa84d12" stroke="#caa84d" stroke-width="0.7" opacity="0.8"/>
      <text x="329" y="257" text-anchor="middle" class="fm" font-size="8.5" fill="#caa84d" letter-spacing="1">DFIR</text>
    </g>
    <g>
      <rect x="364" y="244" width="96" height="20" rx="4" fill="none" stroke="#2a2a31"/>
      <text x="412" y="257" text-anchor="middle" class="fm" font-size="8.5" fill="#9a958a" letter-spacing="1">THREAT HUNT</text>
    </g>
    <g>
      <rect x="466" y="244" width="90" height="20" rx="4" fill="none" stroke="#2a2a31"/>
      <text x="511" y="257" text-anchor="middle" class="fm" font-size="8.5" fill="#9a958a" letter-spacing="1">DETECTION</text>
    </g>
    <g>
      <rect x="562" y="244" width="58" height="20" rx="4" fill="none" stroke="#2a2a31"/>
      <text x="591" y="257" text-anchor="middle" class="fm" font-size="8.5" fill="#9a958a" letter-spacing="1">SIGMA</text>
    </g>
  </g>

  <!-- status -->
  <g class="r5">
    <circle cx="392" cy="287" r="3.4" fill="#3fb950"/>
    <circle cx="392" cy="287" r="3.4" fill="#3fb950" class="live"/>
    <text x="404" y="291" class="fm" font-size="9" fill="#3fb950" letter-spacing="1.5">OPEN TO COLLABORATE</text>
  </g>

  <!-- top + bottom edge lines -->
  <rect x="0" y="0" width="900" height="2" fill="url(#edge)"/>
  <rect x="0" y="328" width="900" height="2" fill="url(#edge)"/>

  <!-- vignette for depth -->
  <rect width="900" height="330" fill="url(#vign)"/>

  <!-- film grain for matte luxury texture -->
  <rect width="900" height="330" filter="url(#grain)" opacity="0.5" pointer-events="none"/>

  <!-- floating embers -->
  <circle cx="220" cy="80" r="1" fill="#caa84d" opacity="0.25" class="fl"/>
  <circle cx="680" cy="100" r="0.9" fill="#caa84d" opacity="0.2" class="fl" style="animation-delay:2s"/>
  <circle cx="600" cy="300" r="1" fill="#8a8578" opacity="0.12" class="fl" style="animation-delay:4s"/>
</svg>
