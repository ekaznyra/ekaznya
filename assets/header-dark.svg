<svg viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="50%" stop-color="#020204"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>

    <!-- Milky Way Core Glow (bright diagonal band) -->
    <radialGradient id="mwCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a2040" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#1a1535" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#110e25" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Warm nebula pocket -->
    <radialGradient id="warmNeb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4a2a15" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#3a1a10" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Cool blue nebula pocket -->
    <radialGradient id="coolNeb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2a4a" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#0e1a35" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Purple nebula -->
    <radialGradient id="purpNeb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3a1a5a" stop-opacity="0.45"/>
      <stop offset="50%" stop-color="#2a1040" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Gold Gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8860b"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="starBright">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    @keyframes slowRotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes slowRotateRev { 0% { transform: rotate(360deg); } 100% { transform: rotate(0deg); } }
    @keyframes pulseGlow { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }
    @keyframes shimmerText { 0% { fill-opacity: 0.85; } 50% { fill-opacity: 1; } 100% { fill-opacity: 0.85; } }
    @keyframes tw1 { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    @keyframes tw2 { 0%, 100% { opacity: 0.6; } 50% { opacity: 0.15; } }
    @keyframes tw3 { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.95; } }

    .rot1 { transform-origin: 700px 200px; animation: slowRotate 30s linear infinite; }
    .rot2 { transform-origin: 700px 200px; animation: slowRotateRev 40s linear infinite; }
    .rot3 { transform-origin: 700px 200px; animation: slowRotate 25s linear infinite; }
    .rot4 { transform-origin: 700px 200px; animation: slowRotateRev 20s linear infinite; }
    .shimmer { animation: shimmerText 4s infinite; }
    .node-pulse { animation: pulseGlow 3s infinite ease-in-out; }
    .t1 { animation: tw1 3s infinite ease-in-out; }
    .t2 { animation: tw2 4s infinite ease-in-out; }
    .t3 { animation: tw3 5s infinite ease-in-out; }
    .t4 { animation: tw1 6s infinite ease-in-out 1s; }
    .t5 { animation: tw2 3.5s infinite ease-in-out 0.5s; }
    .t6 { animation: tw3 4.5s infinite ease-in-out 2s; }

    .font-sans { font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, "Helvetica Neue", Arial, sans-serif; }
    .font-mono { font-family: Consolas, "SFMono-Regular", Menlo, Monaco, "Liberation Mono", monospace; }
  </style>

  <!-- LAYER 0: Black -->
  <rect width="900" height="400" fill="url(#bg)"/>

  <!-- LAYER 1: MILKY WAY BAND — visible diagonal glow -->
  <g transform="rotate(-30 450 200)">
    <!-- Main galactic core glow -->
    <ellipse cx="450" cy="200" rx="550" ry="70" fill="url(#mwCore)"/>
    <!-- Brighter center strip -->
    <ellipse cx="450" cy="200" rx="450" ry="35" fill="#1e1838" opacity="0.5"/>
    <ellipse cx="450" cy="200" rx="350" ry="18" fill="#2a2048" opacity="0.4"/>
    <!-- Ultra bright core line -->
    <ellipse cx="480" cy="200" rx="200" ry="8" fill="#3a2d5a" opacity="0.5"/>
  </g>

  <!-- LAYER 2: Nebula patches along the band -->
  <ellipse cx="200" cy="120" rx="100" ry="50" fill="url(#warmNeb)" transform="rotate(-30 200 120)"/>
  <ellipse cx="500" cy="180" rx="120" ry="55" fill="url(#purpNeb)" transform="rotate(-25 500 180)"/>
  <ellipse cx="350" cy="160" rx="80" ry="40" fill="url(#coolNeb)" transform="rotate(-30 350 160)"/>
  <ellipse cx="700" cy="240" rx="90" ry="45" fill="url(#warmNeb)" transform="rotate(-20 700 240)"/>
  <ellipse cx="800" cy="280" rx="70" ry="35" fill="url(#purpNeb)" transform="rotate(-30 800 280)"/>

  <!-- LAYER 3: Dense star cluster along the Milky Way band -->
  <!-- Bright main stars with glow -->
  <g fill="#ffffff">
    <circle cx="40" cy="55" r="2" filter="url(#starBright)" class="t1"/>
    <circle cx="95" cy="75" r="1.5" class="t2"/>
    <circle cx="140" cy="95" r="2.5" filter="url(#starBright)" class="t3"/>
    <circle cx="185" cy="110" r="1.2"/>
    <circle cx="220" cy="120" r="2" filter="url(#starBright)" class="t4"/>
    <circle cx="270" cy="135" r="1.8" class="t5"/>
    <circle cx="310" cy="150" r="2.5" filter="url(#starBright)" class="t6"/>
    <circle cx="355" cy="160" r="1.3"/>
    <circle cx="390" cy="170" r="2" filter="url(#starBright)" class="t1"/>
    <circle cx="430" cy="180" r="1.5" class="t2"/>
    <circle cx="470" cy="190" r="2.8" filter="url(#starBright)" class="t3"/>
    <circle cx="510" cy="195" r="1.2"/>
    <circle cx="550" cy="205" r="2" filter="url(#starBright)" class="t4"/>
    <circle cx="590" cy="215" r="1.8" class="t5"/>
    <circle cx="630" cy="225" r="2.5" filter="url(#starBright)" class="t6"/>
    <circle cx="670" cy="235" r="1.3"/>
    <circle cx="710" cy="245" r="2" filter="url(#starBright)" class="t1"/>
    <circle cx="755" cy="255" r="1.5" class="t2"/>
    <circle cx="790" cy="265" r="2.5" filter="url(#starBright)" class="t3"/>
    <circle cx="830" cy="275" r="1.8"/>
    <circle cx="870" cy="290" r="2" filter="url(#starBright)" class="t4"/>
  </g>

  <!-- Medium density layer -->
  <g fill="#d0d0ff" opacity="0.7">
    <circle cx="60" cy="65" r="1"/>
    <circle cx="110" cy="82" r="0.8"/>
    <circle cx="155" cy="100" r="1.2"/>
    <circle cx="205" cy="115" r="0.8"/>
    <circle cx="245" cy="128" r="1"/>
    <circle cx="290" cy="142" r="0.8"/>
    <circle cx="335" cy="155" r="1.2"/>
    <circle cx="375" cy="165" r="0.8"/>
    <circle cx="415" cy="175" r="1"/>
    <circle cx="450" cy="185" r="0.8"/>
    <circle cx="490" cy="192" r="1.2"/>
    <circle cx="530" cy="200" r="0.8"/>
    <circle cx="570" cy="210" r="1"/>
    <circle cx="610" cy="220" r="0.8"/>
    <circle cx="650" cy="230" r="1.2"/>
    <circle cx="690" cy="240" r="0.8"/>
    <circle cx="730" cy="250" r="1"/>
    <circle cx="770" cy="260" r="0.8"/>
    <circle cx="810" cy="270" r="1.2"/>
    <circle cx="850" cy="282" r="0.8"/>
  </g>

  <!-- Fine dust stars -->
  <g fill="#ffffff" opacity="0.35">
    <circle cx="75" cy="70" r="0.5"/><circle cx="125" cy="88" r="0.6"/><circle cx="170" cy="105" r="0.5"/>
    <circle cx="215" cy="118" r="0.6"/><circle cx="255" cy="132" r="0.5"/><circle cx="300" cy="145" r="0.6"/>
    <circle cx="345" cy="158" r="0.5"/><circle cx="385" cy="168" r="0.6"/><circle cx="425" cy="178" r="0.5"/>
    <circle cx="460" cy="188" r="0.6"/><circle cx="500" cy="195" r="0.5"/><circle cx="540" cy="203" r="0.6"/>
    <circle cx="580" cy="212" r="0.5"/><circle cx="620" cy="222" r="0.6"/><circle cx="660" cy="232" r="0.5"/>
    <circle cx="700" cy="242" r="0.6"/><circle cx="740" cy="252" r="0.5"/><circle cx="780" cy="262" r="0.6"/>
    <circle cx="820" cy="275" r="0.5"/><circle cx="860" cy="285" r="0.6"/>
  </g>

  <!-- Scattered outer stars (away from band) -->
  <g fill="#ffffff" opacity="0.5">
    <circle cx="50" cy="15" r="1.5" filter="url(#starBright)" class="t3"/>
    <circle cx="200" cy="10" r="1"/>
    <circle cx="350" cy="25" r="1.8" filter="url(#starBright)" class="t5"/>
    <circle cx="500" cy="15" r="1.2"/>
    <circle cx="680" cy="30" r="1.5" filter="url(#starBright)" class="t1"/>
    <circle cx="820" cy="20" r="1"/>
    <circle cx="130" cy="350" r="1.3" class="t6"/>
    <circle cx="300" cy="370" r="1.8" filter="url(#starBright)" class="t2"/>
    <circle cx="480" cy="360" r="1"/>
    <circle cx="620" cy="375" r="1.5" filter="url(#starBright)" class="t4"/>
    <circle cx="780" cy="355" r="1.2" class="t3"/>
    <circle cx="880" cy="370" r="1" class="t5"/>
  </g>

  <!-- Colored accent stars -->
  <circle cx="150" cy="310" r="2.5" fill="#ffe8a0" filter="url(#starBright)" class="t2"/>
  <circle cx="860" cy="60" r="2" fill="#a0c4ff" filter="url(#starBright)" class="t4"/>
  <circle cx="25" cy="250" r="1.8" fill="#ffd4a0" filter="url(#starBright)" class="t6"/>
  <circle cx="470" cy="40" r="2" fill="#ffb0b0" filter="url(#starBright)" class="t1"/>

  <!-- ═══ LAYER 5: Identity ═══ -->
  <g>
    <text x="100" y="160" class="font-sans" font-weight="600" font-size="14" fill="#a9a9a9" letter-spacing="8">
      OPERATIVE ID
    </text>
    <text x="98" y="220" class="font-sans" font-weight="800" font-size="58" fill="#ffffff" letter-spacing="2">
      NGUYỄN NGỌC
    </text>
    <text x="96" y="280" class="font-sans shimmer" font-weight="900" font-size="64" fill="url(#gold)" letter-spacing="2">ANH TÚ</text>
  </g>

  <line x1="100" y1="315" x2="400" y2="315" stroke="url(#gold)" stroke-width="1" filter="url(#softGlow)"/>
  <rect x="400" y="313" width="4" height="4" fill="url(#gold)" class="node-pulse" transform="rotate(45 402 315)"/>

  <text x="100" y="350" class="font-mono" font-weight="normal" font-size="13" fill="#d4af37" letter-spacing="4">
    CYBERSECURITY // DFIR // DETECTION ENG
  </text>

  <!-- ═══ LAYER 6: Astrolabe ═══ -->
  <g>
    <circle cx="700" cy="200" r="6" fill="#d4af37" filter="url(#softGlow)"/>
    <circle cx="700" cy="200" r="15" fill="none" stroke="#d4af37" stroke-width="0.5" opacity="0.6"/>
    <g class="rot1">
      <circle cx="700" cy="200" r="60" fill="none" stroke="#e0e0e0" stroke-width="0.5" opacity="0.4"/>
      <path d="M 700 140 A 60 60 0 0 1 760 200" fill="none" stroke="#e0e0e0" stroke-width="1.5" filter="url(#softGlow)"/>
      <circle cx="700" cy="140" r="3" fill="#ffffff"/>
    </g>
    <g class="rot2">
      <circle cx="700" cy="200" r="100" fill="none" stroke="#d4af37" stroke-width="1" stroke-dasharray="2 4" opacity="0.6"/>
      <path d="M 600 200 A 100 100 0 0 0 700 300" fill="none" stroke="#d4af37" stroke-width="2" filter="url(#goldGlow)"/>
      <rect x="597" y="197" width="6" height="6" fill="#d4af37" transform="rotate(45 600 200)"/>
    </g>
    <g class="rot3">
      <circle cx="700" cy="200" r="150" fill="none" stroke="#b8860b" stroke-width="0.3" opacity="0.5"/>
      <path d="M 700 50 A 150 150 0 0 1 850 200" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
      <circle cx="700" cy="50" r="2.5" fill="#d4af37" filter="url(#softGlow)"/>
    </g>
    <g class="rot4">
      <circle cx="700" cy="200" r="35" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-dasharray="10 5" opacity="0.7"/>
    </g>
    <line x1="530" y1="200" x2="870" y2="200" stroke="#d4af37" stroke-width="0.3" opacity="0.3"/>
    <line x1="700" y1="30" x2="700" y2="370" stroke="#d4af37" stroke-width="0.3" opacity="0.3"/>
  </g>
</svg>
