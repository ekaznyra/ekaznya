<svg viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#010409"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#f0d060"/>
    </linearGradient>
    <linearGradient id="line1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0"/>
      <stop offset="50%" stop-color="#d4af37" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    @keyframes typing{0%{width:0}40%{width:430px}60%{width:430px}100%{width:0}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
    @keyframes fadeIn{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}
    @keyframes dash{0%{stroke-dashoffset:1000}100%{stroke-dashoffset:0}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
    @keyframes twinkle{0%,100%{opacity:0.15}50%{opacity:0.6}}

    .cursor{animation:blink 0.8s infinite}
    .p1{animation:pulse 3s infinite ease-in-out}
    .p2{animation:pulse 4s infinite ease-in-out 1s}
    .p3{animation:pulse 5s infinite ease-in-out 2s}
    .fl{animation:float 6s ease-in-out infinite}
    .tw{animation:twinkle 4s infinite ease-in-out}

    .fs{font-family:Arial,"Segoe UI",Helvetica,sans-serif}
    .fm{font-family:"Courier New",Consolas,monospace}
  </style>

  <rect width="900" height="320" fill="url(#bg)"/>

  <!-- Subtle constellation dots -->
  <g fill="#d4af37" opacity="0.15">
    <circle cx="620" cy="40" r="1.5" class="tw"/><circle cx="700" cy="80" r="1" class="tw"/>
    <circle cx="750" cy="35" r="1.2"/><circle cx="800" cy="100" r="1.5" class="tw"/>
    <circle cx="680" cy="120" r="1"/><circle cx="850" cy="55" r="1.2" class="tw"/>
    <circle cx="770" cy="150" r="1"/><circle cx="830" cy="180" r="1.5" class="tw"/>
    <circle cx="640" cy="170" r="1.2"/><circle cx="720" cy="200" r="1"/>
    <circle cx="860" cy="250" r="1.5" class="tw"/><circle cx="600" cy="260" r="1"/>
    <circle cx="780" cy="280" r="1.2" class="tw"/><circle cx="700" cy="290" r="1"/>
  </g>
  <!-- Constellation lines -->
  <g stroke="#d4af37" stroke-width="0.3" opacity="0.08">
    <line x1="620" y1="40" x2="700" y2="80"/><line x1="700" y1="80" x2="750" y2="35"/>
    <line x1="700" y1="80" x2="800" y2="100"/><line x1="800" y1="100" x2="850" y2="55"/>
    <line x1="800" y1="100" x2="770" y2="150"/><line x1="680" y1="120" x2="770" y2="150"/>
    <line x1="770" y1="150" x2="830" y2="180"/><line x1="640" y1="170" x2="720" y2="200"/>
    <line x1="830" y1="180" x2="860" y2="250"/><line x1="720" y1="200" x2="780" y2="280"/>
  </g>

  <!-- Left accent line -->
  <line x1="60" y1="60" x2="60" y2="260" stroke="#d4af37" stroke-width="1" opacity="0.15"/>
  <circle cx="60" cy="60" r="2" fill="#d4af37" opacity="0.3" class="p1"/>
  <circle cx="60" cy="260" r="2" fill="#d4af37" opacity="0.3" class="p2"/>

  <!-- Label -->
  <text x="80" y="95" class="fm" font-size="11" fill="#484f58" letter-spacing="3">// PROFILE</text>

  <!-- Main name -->
  <text x="80" y="150" class="fs" font-weight="300" font-size="64" fill="#e6edf3" letter-spacing="6">ekaznyra</text>

  <!-- Animated underline -->
  <line x1="80" y1="165" x2="470" y2="165" stroke="url(#accent)" stroke-width="2" filter="url(#glow)"/>
  <circle cx="472" cy="165" r="3" fill="#d4af37" filter="url(#glow)" class="p1"/>

  <!-- Subtitle -->
  <text x="82" y="198" class="fs" font-weight="400" font-size="15" fill="#8b949e" letter-spacing="2">Anh Tu Nguyen</text>
  <text x="250" y="198" class="fm" font-size="12" fill="#484f58">// cybersecurity operative</text>

  <!-- Tags -->
  <g>
    <rect x="82" y="218" width="52" height="22" rx="4" fill="none" stroke="#d4af37" stroke-width="0.8" opacity="0.5"/>
    <text x="108" y="233" text-anchor="middle" class="fm" font-size="9" fill="#d4af37" letter-spacing="1">DFIR</text>

    <rect x="144" y="218" width="108" height="22" rx="4" fill="none" stroke="#30363d" stroke-width="0.8"/>
    <text x="198" y="233" text-anchor="middle" class="fm" font-size="9" fill="#8b949e" letter-spacing="1">THREAT HUNT</text>

    <rect x="262" y="218" width="108" height="22" rx="4" fill="none" stroke="#30363d" stroke-width="0.8"/>
    <text x="316" y="233" text-anchor="middle" class="fm" font-size="9" fill="#8b949e" letter-spacing="1">DETECTION</text>

    <rect x="380" y="218" width="80" height="22" rx="4" fill="none" stroke="#30363d" stroke-width="0.8"/>
    <text x="420" y="233" text-anchor="middle" class="fm" font-size="9" fill="#8b949e" letter-spacing="1">SIGMA</text>
  </g>

  <!-- Bottom line -->
  <line x1="0" y1="318" x2="900" y2="318" stroke="url(#line1)" stroke-width="1"/>
</svg>
