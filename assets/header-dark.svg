<svg viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Pitch Black Base -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="50%" stop-color="#020204"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>

    <!-- Milky Way Band Gradient (diagonal glow) -->
    <linearGradient id="milkyBand" x1="0%" y1="100%" x2="100%" y2="0%" gradientTransform="rotate(-15)">
      <stop offset="0%" stop-color="#1a1030" stop-opacity="0"/>
      <stop offset="25%" stop-color="#1a1535" stop-opacity="0.3"/>
      <stop offset="40%" stop-color="#2a1d4a" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#1e1640" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#2a1d4a" stop-opacity="0.5"/>
      <stop offset="75%" stop-color="#1a1535" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1a1030" stop-opacity="0"/>
    </linearGradient>

    <!-- Nebula Cloud 1 (warm gold dust) -->
    <radialGradient id="nebula1" cx="35%" cy="45%" r="25%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.06"/>
      <stop offset="50%" stop-color="#b8860b" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- Nebula Cloud 2 (cool purple mist) -->
    <radialGradient id="nebula2" cx="65%" cy="35%" r="30%">
      <stop offset="0%" stop-color="#4a2d7a" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#2d1b4e" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- Nebula Cloud 3 (blue wisps) -->
    <radialGradient id="nebula3" cx="80%" cy="60%" r="20%">
      <stop offset="0%" stop-color="#1a3a5c" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- Nebula Cloud 4 (warm center) -->
    <radialGradient id="nebula4" cx="50%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#3d2a1a" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Gold Gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8860b"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur1"/>
      <feMerge><feMergeNode in="blur1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur1"/>
      <feMerge><feMergeNode in="blur1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feMerge><feMergeNode in="blur1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nebulaBlur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <style>
    @keyframes slowRotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes slowRotateRev { 0% { transform: rotate(360deg); } 100% { transform: rotate(0deg); } }
    @keyframes pulseGlow { 0%, 100% { filter: drop-shadow(0 0 2px #d4af37); opacity: 0.7; } 50% { filter: drop-shadow(0 0 8px #d4af37); opacity: 1; } }
    @keyframes shimmerText { 0% { fill-opacity: 0.85; } 50% { fill-opacity: 1; } 100% { fill-opacity: 0.85; } }
    @keyframes twinkle1 { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    @keyframes twinkle2 { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.15; } }
    @keyframes twinkle3 { 0%, 100% { opacity: 0.2; } 40% { opacity: 0.9; } 60% { opacity: 0.9; } }

    .rot1 { transform-origin: 700px 200px; animation: slowRotate 30s linear infinite; }
    .rot2 { transform-origin: 700px 200px; animation: slowRotateRev 40s linear infinite; }
    .rot3 { transform-origin: 700px 200px; animation: slowRotate 25s linear infinite; }
    .rot4 { transform-origin: 700px 200px; animation: slowRotateRev 20s linear infinite; }

    .shimmer { animation: shimmerText 4s infinite; }
    .node-pulse { animation: pulseGlow 3s infinite ease-in-out; }
    .tw1 { animation: twinkle1 3s infinite ease-in-out; }
    .tw2 { animation: twinkle2 4s infinite ease-in-out; }
    .tw3 { animation: twinkle3 5s infinite ease-in-out; }
    .tw4 { animation: twinkle1 6s infinite ease-in-out 1s; }
    .tw5 { animation: twinkle2 3.5s infinite ease-in-out 0.5s; }
    .tw6 { animation: twinkle3 4.5s infinite ease-in-out 2s; }

    .font-sans { font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, "Helvetica Neue", Arial, sans-serif; }
    .font-mono { font-family: Consolas, "SFMono-Regular", Menlo, Monaco, "Liberation Mono", monospace; }
  </style>

  <!-- ═══ LAYER 0: Pitch Black Canvas ═══ -->
  <rect width="900" height="400" fill="url(#bg)"/>

  <!-- ═══ LAYER 1: Milky Way Band (diagonal) ═══ -->
  <rect width="1400" height="200" fill="url(#milkyBand)" transform="rotate(-25 450 200)" x="-250" y="100"/>

  <!-- ═══ LAYER 2: Nebula Clouds ═══ -->
  <ellipse cx="320" cy="180" rx="250" ry="120" fill="url(#nebula1)" filter="url(#nebulaBlur)"/>
  <ellipse cx="600" cy="150" rx="300" ry="150" fill="url(#nebula2)" filter="url(#nebulaBlur)"/>
  <ellipse cx="750" cy="250" rx="200" ry="100" fill="url(#nebula3)" filter="url(#nebulaBlur)"/>
  <ellipse cx="450" cy="200" rx="350" ry="180" fill="url(#nebula4)" filter="url(#nebulaBlur)"/>

  <!-- ═══ LAYER 3: Dense Star Cluster (Milky Way core) ═══ -->
  <!-- Bright stars along the galactic band -->
  <g fill="#ffffff">
    <!-- Top-left to bottom-right diagonal band stars -->
    <circle cx="80" cy="60" r="1.2" class="tw1"/>
    <circle cx="130" cy="90" r="0.8"/>
    <circle cx="160" cy="75" r="1.5" filter="url(#starGlow)" class="tw2"/>
    <circle cx="200" cy="110" r="0.6"/>
    <circle cx="220" cy="95" r="1" class="tw3"/>
    <circle cx="260" cy="130" r="0.7"/>
    <circle cx="290" cy="120" r="1.3" filter="url(#starGlow)" class="tw4"/>
    <circle cx="310" cy="145" r="0.5"/>
    <circle cx="340" cy="135" r="0.9" class="tw1"/>
    <circle cx="370" cy="160" r="1.1" filter="url(#starGlow)" class="tw5"/>
    <circle cx="400" cy="150" r="0.6"/>
    <circle cx="420" cy="175" r="1.4" filter="url(#starGlow)" class="tw6"/>
    <circle cx="450" cy="165" r="0.8"/>
    <circle cx="480" cy="185" r="1" class="tw2"/>
    <circle cx="510" cy="180" r="0.7"/>
    <circle cx="540" cy="200" r="1.3" filter="url(#starGlow)" class="tw3"/>
    <circle cx="570" cy="195" r="0.5"/>
    <circle cx="600" cy="215" r="1.1" class="tw1"/>
    <circle cx="630" cy="210" r="0.8" filter="url(#starGlow)"/>
    <circle cx="660" cy="230" r="1.5" filter="url(#starGlow)" class="tw4"/>
    <circle cx="690" cy="225" r="0.6"/>
    <circle cx="720" cy="245" r="0.9" class="tw5"/>
    <circle cx="750" cy="240" r="1.2" filter="url(#starGlow)" class="tw6"/>
    <circle cx="780" cy="260" r="0.7"/>
    <circle cx="810" cy="255" r="1" class="tw1"/>
    <circle cx="840" cy="275" r="1.3" filter="url(#starGlow)" class="tw2"/>
    <circle cx="870" cy="270" r="0.8"/>
    <circle cx="895" cy="290" r="1.1" filter="url(#starGlow)" class="tw3"/>
  </g>

  <!-- Secondary star layer along band (dimmer, denser) -->
  <g fill="#e0d8ff" opacity="0.5">
    <circle cx="100" cy="80" r="0.5"/>
    <circle cx="145" cy="100" r="0.4"/>
    <circle cx="190" cy="105" r="0.6"/>
    <circle cx="235" cy="115" r="0.3"/>
    <circle cx="275" cy="140" r="0.5"/>
    <circle cx="315" cy="130" r="0.4"/>
    <circle cx="355" cy="155" r="0.6"/>
    <circle cx="395" cy="160" r="0.3"/>
    <circle cx="435" cy="178" r="0.5"/>
    <circle cx="465" cy="170" r="0.4"/>
    <circle cx="495" cy="190" r="0.6"/>
    <circle cx="525" cy="195" r="0.3"/>
    <circle cx="555" cy="205" r="0.5"/>
    <circle cx="585" cy="210" r="0.4"/>
    <circle cx="615" cy="220" r="0.6"/>
    <circle cx="645" cy="225" r="0.3"/>
    <circle cx="675" cy="235" r="0.5"/>
    <circle cx="705" cy="240" r="0.4"/>
    <circle cx="735" cy="250" r="0.6"/>
    <circle cx="765" cy="255" r="0.3"/>
    <circle cx="795" cy="265" r="0.5"/>
    <circle cx="825" cy="270" r="0.4"/>
    <circle cx="855" cy="280" r="0.6"/>
    <circle cx="885" cy="285" r="0.3"/>
  </g>

  <!-- Dust particles (ultra fine, gold tint) -->
  <g fill="#d4af37" opacity="0.25">
    <circle cx="115" cy="85" r="0.3"/>
    <circle cx="175" cy="95" r="0.4"/>
    <circle cx="250" cy="125" r="0.3"/>
    <circle cx="330" cy="148" r="0.4"/>
    <circle cx="410" cy="168" r="0.3"/>
    <circle cx="490" cy="188" r="0.4"/>
    <circle cx="560" cy="205" r="0.3"/>
    <circle cx="640" cy="222" r="0.4"/>
    <circle cx="710" cy="242" r="0.3"/>
    <circle cx="790" cy="262" r="0.4"/>
    <circle cx="860" cy="278" r="0.3"/>
  </g>

  <!-- ═══ LAYER 4: Scattered Field Stars (outside band) ═══ -->
  <g fill="#ffffff" opacity="0.6">
    <!-- Upper region -->
    <circle cx="50" cy="25" r="0.8" class="tw3"/>
    <circle cx="180" cy="15" r="0.6"/>
    <circle cx="320" cy="30" r="1" filter="url(#starGlow)" class="tw5"/>
    <circle cx="500" cy="20" r="0.7"/>
    <circle cx="650" cy="40" r="0.9" class="tw1"/>
    <circle cx="800" cy="25" r="0.5"/>
    <circle cx="440" cy="50" r="1.1" filter="url(#starGlow)" class="tw4"/>
    <!-- Lower region -->
    <circle cx="60" cy="350" r="0.9" class="tw2"/>
    <circle cx="200" cy="370" r="0.6"/>
    <circle cx="350" cy="380" r="1" filter="url(#starGlow)" class="tw6"/>
    <circle cx="500" cy="360" r="0.7"/>
    <circle cx="650" cy="370" r="0.8" class="tw3"/>
    <circle cx="800" cy="350" r="1.2" filter="url(#starGlow)" class="tw1"/>
    <!-- Bright accent stars -->
    <circle cx="150" cy="300" r="1.5" filter="url(#starGlow)" class="tw2" fill="#ffe8a0"/>
    <circle cx="850" cy="80" r="1.3" filter="url(#starGlow)" class="tw4" fill="#a0c4ff"/>
    <circle cx="30" cy="200" r="1" filter="url(#starGlow)" class="tw6" fill="#ffd4a0"/>
  </g>

  <!-- ═══ LAYER 5: Left Side Identity ═══ -->
  <g>
    <text x="100" y="160" class="font-sans" font-weight="600" font-size="14" fill="#a9a9a9" letter-spacing="8">
      OPERATIVE ID
    </text>

    <text x="98" y="220" class="font-sans" font-weight="800" font-size="58" fill="#ffffff" letter-spacing="2">
      NGUYỄN NGỌC
    </text>

    <!-- Shimmering Gold Name -->
    <text x="96" y="280" class="font-sans shimmer" font-weight="900" font-size="64" fill="url(#gold)" letter-spacing="2">ANH TÚ</text>
  </g>

  <!-- Thin Elegant Divider Line -->
  <line x1="100" y1="315" x2="400" y2="315" stroke="url(#gold)" stroke-width="1" filter="url(#softGlow)"/>
  <rect x="400" y="313" width="4" height="4" fill="url(#gold)" class="node-pulse" transform="rotate(45 402 315)"/>

  <!-- Role Details -->
  <text x="100" y="350" class="font-mono" font-weight="normal" font-size="13" fill="#d4af37" letter-spacing="4">
    CYBERSECURITY // DFIR // DETECTION ENG
  </text>

  <!-- ═══ LAYER 6: Luxury Astrolabe Mechanism ═══ -->
  <g>
    <circle cx="700" cy="200" r="6" fill="#d4af37" filter="url(#softGlow)"/>
    <circle cx="700" cy="200" r="15" fill="none" stroke="#d4af37" stroke-width="0.5" opacity="0.6"/>

    <g class="rot1">
      <circle cx="700" cy="200" r="60" fill="none" stroke="#e0e0e0" stroke-width="0.5" opacity="0.4"/>
      <path d="M 700 140 A 60 60 0 0 1 760 200" fill="none" stroke="#e0e0e0" stroke-width="1.5" filter="url(#softGlow)"/>
      <circle cx="700" cy="140" r="3" fill="#ffffff"/>
    </g>

    <g class="rot2">
      <circle cx="700" cy="200" r="100" fill="none" stroke="#d4af37" stroke-width="1" stroke-dasharray="2 4" opacity="0.6"/>
      <path d="M 600 200 A 100 100 0 0 0 700 300" fill="none" stroke="#d4af37" stroke-width="2" filter="url(#goldGlow)"/>
      <rect x="597" y="197" width="6" height="6" fill="#d4af37" transform="rotate(45 600 200)"/>
    </g>

    <g class="rot3">
      <circle cx="700" cy="200" r="150" fill="none" stroke="#b8860b" stroke-width="0.3" opacity="0.5"/>
      <path d="M 700 50 A 150 150 0 0 1 850 200" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
      <circle cx="700" cy="50" r="2.5" fill="#d4af37" filter="url(#softGlow)"/>
    </g>

    <g class="rot4">
      <circle cx="700" cy="200" r="35" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-dasharray="10 5" opacity="0.7"/>
    </g>

    <line x1="530" y1="200" x2="870" y2="200" stroke="#d4af37" stroke-width="0.3" opacity="0.3"/>
    <line x1="700" y1="30" x2="700" y2="370" stroke="#d4af37" stroke-width="0.3" opacity="0.3"/>
  </g>

</svg>
