<svg viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep Space Background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000005"/>
      <stop offset="30%" stop-color="#020210"/>
      <stop offset="60%" stop-color="#050515"/>
      <stop offset="100%" stop-color="#000005"/>
    </linearGradient>

    <!-- Milky Way Band -->
    <radialGradient id="mwCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#352855" stop-opacity="0.85"/>
      <stop offset="25%" stop-color="#281e45" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#1a1535" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Nebula colors -->
    <radialGradient id="nebPink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8a3060" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a3a6a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebGold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5a4020" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Planet gradients -->
    <radialGradient id="planetBig" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#4a3a6a"/>
      <stop offset="40%" stop-color="#2a1d4a"/>
      <stop offset="100%" stop-color="#110a25"/>
    </radialGradient>
    <linearGradient id="planetAtmo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6a4a9a" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#3a2a6a" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#1a1a4a" stop-opacity="0.3"/>
    </linearGradient>
    <radialGradient id="planetSmall" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="50%" stop-color="#8a6a20"/>
      <stop offset="100%" stop-color="#3a2a10"/>
    </radialGradient>
    <radialGradient id="planetIce" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#8ab4d4"/>
      <stop offset="40%" stop-color="#4a7a9a"/>
      <stop offset="100%" stop-color="#1a3a5a"/>
    </radialGradient>

    <!-- Saturn ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0"/>
      <stop offset="15%" stop-color="#d4af37" stop-opacity="0.5"/>
      <stop offset="30%" stop-color="#e8d080" stop-opacity="0.7"/>
      <stop offset="45%" stop-color="#d4af37" stop-opacity="0.3"/>
      <stop offset="55%" stop-color="#c0a030" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#e8d080" stop-opacity="0.7"/>
      <stop offset="85%" stop-color="#d4af37" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </linearGradient>

    <!-- Gold text -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8860b"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="planetGlow">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    /* Shooting stars */
    @keyframes shoot1 { 0% { transform: translate(0,0); opacity: 1; } 100% { transform: translate(120px,60px); opacity: 0; } }
    @keyframes shoot2 { 0% { transform: translate(0,0); opacity: 1; } 100% { transform: translate(-100px,50px); opacity: 0; } }
    @keyframes shoot3 { 0% { transform: translate(0,0); opacity: 1; } 100% { transform: translate(80px,40px); opacity: 0; } }

    /* Planet orbit float */
    @keyframes floatUp { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    @keyframes floatDown { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(4px); } }

    /* Ring rotation */
    @keyframes ringPulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 0.9; } }

    /* Star twinkle */
    @keyframes tw1 { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    @keyframes tw2 { 0%, 100% { opacity: 0.6; } 50% { opacity: 0.15; } }
    @keyframes tw3 { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.95; } }

    /* Nebula breathing */
    @keyframes breathe { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.5; } }

    /* Name shimmer */
    @keyframes shimmer { 0% { fill-opacity: 0.85; } 50% { fill-opacity: 1; } 100% { fill-opacity: 0.85; } }

    .shoot1 { animation: shoot1 2s linear infinite 0s; }
    .shoot2 { animation: shoot2 3s linear infinite 1.5s; }
    .shoot3 { animation: shoot3 2.5s linear infinite 3s; }
    .float1 { animation: floatUp 8s ease-in-out infinite; }
    .float2 { animation: floatDown 6s ease-in-out infinite; }
    .float3 { animation: floatUp 10s ease-in-out infinite 2s; }
    .ringP { animation: ringPulse 5s ease-in-out infinite; }
    .t1 { animation: tw1 3s infinite ease-in-out; }
    .t2 { animation: tw2 4s infinite ease-in-out; }
    .t3 { animation: tw3 5s infinite ease-in-out; }
    .t4 { animation: tw1 6s infinite ease-in-out 1s; }
    .t5 { animation: tw2 3.5s infinite ease-in-out 0.5s; }
    .t6 { animation: tw3 4.5s infinite ease-in-out 2s; }
    .nBreath { animation: breathe 6s ease-in-out infinite; }
    .nBreath2 { animation: breathe 8s ease-in-out infinite 3s; }
    .shimmer { animation: shimmer 4s infinite; }

    .font-sans { font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, "Helvetica Neue", Arial, sans-serif; }
    .font-mono { font-family: Consolas, "SFMono-Regular", Menlo, Monaco, "Liberation Mono", monospace; }
  </style>

  <!-- ═══ LAYER 0: Deep Space ═══ -->
  <rect width="900" height="400" fill="url(#bg)"/>

  <!-- ═══ LAYER 1: MILKY WAY BAND ═══ -->
  <g transform="rotate(-28 450 200)">
    <ellipse cx="450" cy="200" rx="600" ry="80" fill="url(#mwCore)"/>
    <ellipse cx="450" cy="200" rx="500" ry="45" fill="#241a40" opacity="0.55"/>
    <ellipse cx="470" cy="200" rx="350" ry="22" fill="#30245a" opacity="0.45"/>
    <ellipse cx="480" cy="200" rx="200" ry="10" fill="#3d2d6a" opacity="0.5"/>
  </g>

  <!-- ═══ LAYER 2: Nebula Clouds (breathing) ═══ -->
  <ellipse cx="180" cy="110" rx="110" ry="55" fill="url(#nebPink)" class="nBreath" transform="rotate(-20 180 110)"/>
  <ellipse cx="450" cy="170" rx="130" ry="60" fill="url(#nebBlue)" class="nBreath2" transform="rotate(-25 450 170)"/>
  <ellipse cx="700" cy="250" rx="100" ry="50" fill="url(#nebGold)" class="nBreath" transform="rotate(-30 700 250)"/>
  <ellipse cx="350" cy="150" rx="90" ry="45" fill="url(#nebPink)" class="nBreath2" transform="rotate(-15 350 150)" opacity="0.5"/>
  <ellipse cx="800" cy="200" rx="80" ry="40" fill="url(#nebBlue)" class="nBreath" transform="rotate(-35 800 200)" opacity="0.4"/>

  <!-- ═══ LAYER 3: Dense Starfield ═══ -->
  <!-- Bright stars along MW band -->
  <g fill="#ffffff">
    <circle cx="50" cy="55" r="2" filter="url(#glow)" class="t1"/>
    <circle cx="120" cy="80" r="2.5" filter="url(#glow)" class="t3"/>
    <circle cx="200" cy="105" r="1.5" class="t2"/>
    <circle cx="270" cy="130" r="2.8" filter="url(#glow)" class="t5"/>
    <circle cx="340" cy="150" r="1.8" class="t4"/>
    <circle cx="400" cy="165" r="2.5" filter="url(#glow)" class="t6"/>
    <circle cx="460" cy="180" r="1.5" class="t1"/>
    <circle cx="520" cy="195" r="3" filter="url(#glow)" class="t3"/>
    <circle cx="580" cy="210" r="1.8" class="t5"/>
    <circle cx="640" cy="225" r="2.5" filter="url(#glow)" class="t2"/>
    <circle cx="710" cy="245" r="2" class="t4"/>
    <circle cx="780" cy="260" r="2.8" filter="url(#glow)" class="t6"/>
    <circle cx="850" cy="280" r="2" filter="url(#glow)" class="t1"/>
  </g>

  <!-- Medium stars -->
  <g fill="#d8d0ff" opacity="0.7">
    <circle cx="80" cy="68" r="1.2" class="t4"/><circle cx="160" cy="92" r="1" class="t1"/>
    <circle cx="240" cy="118" r="1.3"/><circle cx="305" cy="138" r="1" class="t6"/>
    <circle cx="370" cy="158" r="1.2"/><circle cx="430" cy="172" r="1" class="t2"/>
    <circle cx="490" cy="188" r="1.3"/><circle cx="550" cy="202" r="1" class="t5"/>
    <circle cx="610" cy="218" r="1.2"/><circle cx="675" cy="235" r="1" class="t3"/>
    <circle cx="745" cy="252" r="1.3"/><circle cx="815" cy="270" r="1"/>
  </g>

  <!-- Scattered field stars -->
  <g fill="#ffffff" opacity="0.5">
    <circle cx="30" cy="15" r="1.5" filter="url(#glow)" class="t3"/>
    <circle cx="180" cy="20" r="1"/>
    <circle cx="450" cy="30" r="1.8" filter="url(#glow)" class="t5"/>
    <circle cx="700" cy="25" r="1.2"/>
    <circle cx="860" cy="40" r="1.5" filter="url(#glow)" class="t1"/>
    <circle cx="100" cy="360" r="1.2" class="t6"/>
    <circle cx="300" cy="375" r="1.5" filter="url(#glow)" class="t2"/>
    <circle cx="550" cy="365" r="1"/>
    <circle cx="750" cy="380" r="1.3" class="t4"/>
    <circle cx="880" cy="360" r="1" class="t5"/>
  </g>

  <!-- Colored accent stars -->
  <circle cx="320" cy="35" r="2" fill="#ffa0a0" filter="url(#glow)" class="t2"/>
  <circle cx="680" cy="370" r="2" fill="#a0d0ff" filter="url(#glow)" class="t4"/>

  <!-- ═══ LAYER 4: PLANETS ═══ -->

  <!-- PLANET 1: Large Gas Giant (top right, partially behind MW) -->
  <g class="float1">
    <!-- Atmosphere glow -->
    <circle cx="780" cy="90" r="55" fill="#4a3a7a" opacity="0.15" filter="url(#planetGlow)"/>
    <!-- Planet body -->
    <circle cx="780" cy="90" r="38" fill="url(#planetBig)"/>
    <!-- Atmosphere rim -->
    <circle cx="780" cy="90" r="40" fill="none" stroke="#6a5a9a" stroke-width="1.5" opacity="0.4"/>
    <!-- Surface bands -->
    <ellipse cx="780" cy="80" rx="36" ry="5" fill="#5a4a8a" opacity="0.2"/>
    <ellipse cx="780" cy="95" rx="35" ry="4" fill="#3a2a6a" opacity="0.25"/>
    <ellipse cx="780" cy="105" rx="30" ry="3" fill="#4a3a7a" opacity="0.15"/>
    <!-- Light reflection -->
    <ellipse cx="768" cy="78" rx="10" ry="15" fill="#ffffff" opacity="0.06"/>
  </g>

  <!-- PLANET 2: Saturn-like with rings (center-right) -->
  <g class="float2">
    <!-- Planet body -->
    <circle cx="620" cy="55" r="18" fill="url(#planetSmall)"/>
    <!-- Surface detail -->
    <ellipse cx="620" cy="50" rx="16" ry="3" fill="#c09a30" opacity="0.2"/>
    <ellipse cx="620" cy="58" rx="15" ry="2.5" fill="#a08020" opacity="0.15"/>
    <!-- Ring (behind) - lower half visible -->
    <ellipse cx="620" cy="55" rx="38" ry="8" fill="none" stroke="url(#ringGrad)" stroke-width="3" opacity="0.5" class="ringP"/>
    <!-- Ring inner -->
    <ellipse cx="620" cy="55" rx="30" ry="6" fill="none" stroke="#e8d080" stroke-width="1.5" opacity="0.35" class="ringP"/>
    <!-- Light reflection -->
    <ellipse cx="614" cy="48" rx="5" ry="8" fill="#ffffff" opacity="0.08"/>
  </g>

  <!-- PLANET 3: Small ice planet (bottom left) -->
  <g class="float3">
    <circle cx="120" cy="320" r="12" fill="url(#planetIce)"/>
    <!-- Ice surface detail -->
    <ellipse cx="120" cy="316" rx="10" ry="2" fill="#a0d0f0" opacity="0.15"/>
    <ellipse cx="120" cy="324" rx="9" ry="1.5" fill="#80b0d0" opacity="0.1"/>
    <!-- Atmosphere -->
    <circle cx="120" cy="320" r="14" fill="none" stroke="#6aaad4" stroke-width="1" opacity="0.3"/>
    <!-- Light reflection -->
    <ellipse cx="115" cy="314" rx="3" ry="5" fill="#ffffff" opacity="0.1"/>
  </g>

  <!-- PLANET 4: Tiny distant moon -->
  <g class="float1">
    <circle cx="400" cy="45" r="5" fill="#888888"/>
    <ellipse cx="398" cy="43" rx="2" ry="3" fill="#aaaaaa" opacity="0.2"/>
    <circle cx="400" cy="45" r="6" fill="none" stroke="#aaaaaa" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- ═══ LAYER 5: SHOOTING STARS ═══ -->
  <g class="shoot1">
    <line x1="150" y1="30" x2="130" y2="20" stroke="#ffffff" stroke-width="2" opacity="0.9"/>
    <line x1="130" y1="20" x2="120" y2="16" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  </g>
  <g class="shoot2">
    <line x1="700" y1="80" x2="720" y2="70" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>
    <line x1="720" y1="70" x2="728" y2="67" stroke="#ffffff" stroke-width="0.8" opacity="0.4"/>
  </g>
  <g class="shoot3">
    <line x1="500" y1="50" x2="480" y2="40" stroke="#ffd700" stroke-width="1.5" opacity="0.7"/>
    <line x1="480" y1="40" x2="472" y2="37" stroke="#ffd700" stroke-width="0.8" opacity="0.35"/>
  </g>

  <!-- ═══ LAYER 6: Identity Text ═══ -->
  <g>
    <text x="60" y="180" class="font-sans" font-weight="600" font-size="13" fill="#a9a9a9" letter-spacing="6">
      OPERATIVE ID
    </text>
    <text x="58" y="235" class="font-sans" font-weight="800" font-size="52" fill="#ffffff" letter-spacing="2">
      NGUYỄN NGỌC
    </text>
    <text x="56" y="295" class="font-sans shimmer" font-weight="900" font-size="60" fill="url(#gold)" letter-spacing="2">ANH TÚ</text>
  </g>

  <!-- Elegant line -->
  <line x1="60" y1="320" x2="350" y2="320" stroke="url(#gold)" stroke-width="1" filter="url(#glow)"/>
  <circle cx="352" cy="320" r="2" fill="#d4af37" filter="url(#glow)"/>

  <!-- Role -->
  <text x="60" y="355" class="font-mono" font-weight="normal" font-size="12" fill="#d4af37" letter-spacing="3">
    CYBERSECURITY // DFIR // DETECTION ENG
  </text>

</svg>
