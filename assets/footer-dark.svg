<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 80"><defs><radialGradient id="bgRad" cx="50%" cy="100%" r="100%"><stop offset="0%" stop-color="#13110a"/><stop offset="68%" stop-color="#0a0a0c"/><stop offset="100%" stop-color="#000"/></radialGradient><linearGradient id="gl" x1="0%" x2="100%" y1="0%" y2="0%"><stop offset="0%" stop-color="#caa84d" stop-opacity="0"/><stop offset="50%" stop-color="#caa84d" stop-opacity=".4"/><stop offset="100%" stop-color="#caa84d" stop-opacity="0"/></linearGradient><linearGradient id="motto" x1="0%" x2="100%" y1="0%" y2="0%"><stop offset="0%" stop-color="#caa84d"/><stop offset="50%" stop-color="#f5e3a3"/><stop offset="100%" stop-color="#8a6f24"/></linearGradient><linearGradient id="mottoShine" x1="300" x2="380" y1="0" y2="0" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#fff" stop-opacity="0"/><stop offset=".5" stop-color="#fff7d6" stop-opacity=".85"/><stop offset="1" stop-color="#fff" stop-opacity="0"/><animateTransform attributeName="gradientTransform" begin="1s" dur="5.5s" from="-260 0" repeatCount="indefinite" to="560 0" type="translate"/></linearGradient><filter id="glow"><feGaussianBlur result="b" stdDeviation="1.4"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><style>@keyframes pulse{0%{opacity:.3}50%{opacity:.8}}@keyframes glowText{0%{opacity:.7}50%{opacity:1}}.p{animation:pulse 3s ease-in-out infinite}.gt{animation:glowText 4s ease-in-out infinite}.fs{font-family:Georgia,&quot;Times New Roman&quot;,serif}.fm{font-family:&quot;Courier New&quot;,Consolas,monospace}</style><rect width="900" height="80" fill="url(#bgRad)"/><line x1="200" x2="700" y1="10" y2="10" stroke="url(#gl)" stroke-width=".5"/><circle cx="450" cy="10" r="1.6" fill="#caa84d" class="p"/><text x="450" y="38" fill="#7a756a" class="fs" font-size="11.5" font-style="italic" letter-spacing="1" text-anchor="middle">&quot;Every investigation teaches something. Every detection rule is a lesson documented.&quot;</text><text x="450" y="62" fill="url(#motto)" class="fm gt" filter="url(#glow)" font-size="10" letter-spacing="4" text-anchor="middle">UNDERSTAND · DETECT · DEFEND</text><text x="450" y="62" fill="url(#mottoShine)" class="fm" font-size="10" letter-spacing="4" text-anchor="middle">UNDERSTAND · DETECT · DEFEND</text></svg>