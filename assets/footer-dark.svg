<svg viewBox="0 0 900 70" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#010409"/>
    </linearGradient>
    <linearGradient id="gl" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0"/>
      <stop offset="50%" stop-color="#d4af37" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <style>
    .fs{font-family:Arial,"Segoe UI",Helvetica,sans-serif}
    .fm{font-family:"Courier New",Consolas,monospace}
  </style>

  <rect width="900" height="70" fill="url(#bg)"/>

  <!-- Top line -->
  <line x1="200" y1="8" x2="700" y2="8" stroke="url(#gl)" stroke-width="0.5"/>

  <!-- Quote -->
  <text x="450" y="35" text-anchor="middle" class="fs" font-size="11" fill="#484f58" font-style="italic" letter-spacing="1">
    "Every investigation teaches something. Every detection rule is a lesson documented."
  </text>

  <text x="450" y="55" text-anchor="middle" class="fm" font-size="9" fill="#30363d" letter-spacing="2">
    UNDERSTAND. DETECT. DEFEND.
  </text>
</svg>
