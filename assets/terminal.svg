<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200"><style>@keyframes blink{0%{opacity:1}50%{opacity:0}}@keyframes scan{0%{transform:translateY(-100px)}}.terminal{font-family:&quot;Courier New&quot;,Consolas,monospace;font-size:14px;fill:#caa84d}.prompt{fill:#5c574c}.cursor{animation:blink 1s step-end infinite}.line{opacity:0;animation:appear .1s forwards}.l1{animation-delay:.5s}.l2{animation-delay:1.5s}.l3{animation-delay:2.5s}.l4{animation-delay:3.5s}.scanline{width:100%;height:100px;fill:url(#scanGradient);animation:scan 4s linear infinite}</style><defs><linearGradient id="scanGradient" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#caa84d" stop-opacity="0"/><stop offset="100%" stop-color="#caa84d" stop-opacity=".05"/></linearGradient></defs><rect width="800" height="200" fill="#0a0a0c" rx="10"/><rect width="800" height="30" fill="#14110a" rx="10"/><circle cx="20" cy="15" r="6" fill="#ff5f56"/><circle cx="40" cy="15" r="6" fill="#ffbd2e"/><circle cx="60" cy="15" r="6" fill="#27c93f"/><text x="400" y="20" fill="#caa84d" font-family="monospace" font-size="12" opacity=".6" text-anchor="middle">root@sec-mainframe:~</text><rect class="scanline"/><g class="terminal"><text x="20" y="60" class="line l1"><tspan class="prompt">root@sec-mainframe:~$</tspan> tail -n 3 /var/log/syslog</text><text x="20" y="90" class="line l2">[SYS] [*] Initialized defense systems...</text><text x="20" y="115" class="line l3">[SYS] [*] Scanning for anomalies...</text><text x="20" y="140" class="line l4">[SYS] [*] No recent anomalies detected.</text><text x="20" y="170" class="line l4"><tspan class="prompt">root@sec-mainframe:~$</tspan> <tspan class="cursor">_</tspan></text></g></svg>