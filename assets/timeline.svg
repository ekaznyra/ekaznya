<svg viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep Cosmic Background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020105"/>
      <stop offset="50%" stop-color="#06050b"/>
      <stop offset="100%" stop-color="#030305"/>
    </linearGradient>

    <!-- Milky Way Dust Gradients -->
    <radialGradient id="dust1" cx="20%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dust2" cx="80%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <filter id="starGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    @keyframes drawLine { 0% { stroke-dashoffset: 800; } 100% { stroke-dashoffset: 0; } }
    @keyframes fadeUp { 0% { opacity: 0; transform: translateY(5px); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
    @keyframes driftStars { 0% { transform: translateX(0) translateY(0); } 100% { transform: translateX(-10px) translateY(-5px); } }

    .main-line { stroke-dasharray: 800; animation: drawLine 2s cubic-bezier(0.2, 0.8, 0.3, 1) both; }
    
    .n1 { animation: fadeUp 0.8s cubic-bezier(0.1, 0.8, 0.2, 1) 0.5s both; }
    .n2 { animation: fadeUp 0.8s cubic-bezier(0.1, 0.8, 0.2, 1) 0.8s both; }
    .n3 { animation: fadeUp 0.8s cubic-bezier(0.1, 0.8, 0.2, 1) 1.1s both; }
    .n4 { animation: fadeUp 0.8s cubic-bezier(0.1, 0.8, 0.2, 1) 1.4s both; }
    
    .tw { animation: twinkle 4s ease-in-out infinite; }
    .star-drift { animation: driftStars 60s linear infinite alternate; }

    .font-sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    .font-mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; }
  </style>

  <rect width="900" height="200" fill="url(#bg)"/>

  <!-- Milky Way Dust -->
  <ellipse cx="250" cy="100" rx="400" ry="80" fill="url(#dust1)" transform="rotate(-5 250 100)"/>
  <ellipse cx="700" cy="100" rx="300" ry="100" fill="url(#dust2)" transform="rotate(-15 700 100)"/>

  <!-- Starfield Layer -->
  <g class="star-drift">
    <!-- Background stars -->
    <g fill="#ffffff" opacity="0.4">
      <circle cx="80" cy="40" r="0.5"/><circle cx="150" cy="160" r="0.8"/><circle cx="320" cy="60" r="0.6"/>
      <circle cx="480" cy="140" r="0.5"/><circle cx="650" cy="40" r="0.9"/><circle cx="850" cy="170" r="0.7"/>
      <circle cx="750" cy="130" r="0.5"/><circle cx="380" cy="180" r="0.8"/><circle cx="100" cy="120" r="0.6"/>
    </g>
    <!-- Twinkling stars -->
    <circle cx="200" cy="60" r="1.2" fill="#ffffff" class="tw" filter="url(#starGlow)"/>
    <circle cx="600" cy="140" r="1.5" fill="#d4af37" class="tw" filter="url(#starGlow)"/>
    <circle cx="800" cy="50" r="1.5" fill="#ffffff" class="tw" filter="url(#starGlow)"/>
  </g>

  <!-- Constellation Connections (Timeline Axis) -->
  <line x1="100" y1="100" x2="800" y2="100" stroke="#ffffff" stroke-width="0.3" opacity="0.2"/>
  <line x1="100" y1="100" x2="500" y2="100" stroke="#ffffff" stroke-width="1.5" class="main-line" filter="url(#starGlow)"/>

  <!-- Title -->
  <text x="450" y="25" text-anchor="middle" class="font-sans" font-weight="600" font-size="10" fill="#ffffff" letter-spacing="4">
    PROGRESSION
  </text>
  <rect x="445" y="40" width="10" height="1" fill="#d4af37"/>

  <!-- Node 1: 2025 -->
  <g class="n1">
    <circle cx="150" cy="100" r="4" fill="#000000" stroke="#ffffff" stroke-width="1.5"/>
    <text x="150" y="80" text-anchor="middle" class="font-sans" font-size="12" font-weight="600" fill="#aaaaaa">2025</text>
    <text x="150" y="120" text-anchor="middle" class="font-mono" font-size="8" fill="#888888">LINUX / NETWORKING</text>
  </g>

  <!-- Node 2: Fundamentals -->
  <g class="n2">
    <circle cx="325" cy="100" r="3" fill="#ffffff" filter="url(#starGlow)"/>
    <text x="325" y="80" text-anchor="middle" class="font-sans" font-size="9" fill="#aaaaaa">SECURITY FUNDAMENTALS</text>
    <text x="325" y="120" text-anchor="middle" class="font-mono" font-size="8" fill="#888888">MONITORING / LOGS</text>
  </g>

  <!-- Node 3: 2026 (Active) -->
  <g class="n3">
    <!-- Active Constellation Star -->
    <path d="M 500 92 L 502 98 L 508 100 L 502 102 L 500 108 L 498 102 L 492 100 L 498 98 Z" fill="#d4af37" filter="url(#starGlow)"/>
    <text x="500" y="80" text-anchor="middle" class="font-sans" font-size="14" font-weight="600" fill="#ffffff" filter="url(#starGlow)">2026</text>
    <text x="500" y="120" text-anchor="middle" class="font-mono" font-size="9" font-weight="bold" fill="#d4af37">DFIR / THREAT HUNTING</text>
    <text x="500" y="132" text-anchor="middle" class="font-mono" font-size="8" fill="#aaaaaa">YARA / SIGMA</text>
  </g>

  <!-- Node 4: Future -->
  <g class="n4">
    <circle cx="750" cy="100" r="4" fill="#000000" stroke="#555555" stroke-width="1.5" stroke-dasharray="2 2"/>
    <text x="750" y="80" text-anchor="middle" class="font-sans" font-size="10" font-weight="600" fill="#555555">NEXT</text>
    <text x="750" y="120" text-anchor="middle" class="font-mono" font-size="8" fill="#555555">DETECTION ENG / SOC OPS</text>
  </g>

</svg>
