<svg viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- True Black Background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#030303"/>
    </linearGradient>
  </defs>

  <style>
    @keyframes drawLine {
      0% { stroke-dashoffset: 800; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(5px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .main-line { stroke-dasharray: 800; animation: drawLine 2s cubic-bezier(0.2, 0.8, 0.3, 1) both; }
    
    .n1 { animation: fadeUp 0.8s cubic-bezier(0.1, 0.8, 0.2, 1) 0.5s both; }
    .n2 { animation: fadeUp 0.8s cubic-bezier(0.1, 0.8, 0.2, 1) 0.8s both; }
    .n3 { animation: fadeUp 0.8s cubic-bezier(0.1, 0.8, 0.2, 1) 1.1s both; }
    .n4 { animation: fadeUp 0.8s cubic-bezier(0.1, 0.8, 0.2, 1) 1.4s both; }

    .font-sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    .font-mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; }
  </style>

  <rect width="900" height="200" fill="url(#bg)"/>

  <!-- Minimalist Grid -->
  <g stroke="#111111" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
  </g>

  <!-- Title -->
  <text x="450" y="25" text-anchor="middle" class="font-sans" font-weight="600" font-size="10" fill="#ffffff" letter-spacing="4">
    PROGRESSION
  </text>
  <rect x="445" y="40" width="10" height="1" fill="#d4af37"/>

  <!-- Chronograph Axis -->
  <line x1="100" y1="100" x2="800" y2="100" stroke="#333333" stroke-width="1.5"/>
  <line x1="100" y1="100" x2="500" y2="100" stroke="#ffffff" stroke-width="1.5" class="main-line"/>

  <!-- Node 1: 2025 -->
  <g class="n1">
    <circle cx="150" cy="100" r="4" fill="#000000" stroke="#888888" stroke-width="1.5"/>
    <text x="150" y="80" text-anchor="middle" class="font-sans" font-size="12" font-weight="600" fill="#aaaaaa">2025</text>
    <text x="150" y="120" text-anchor="middle" class="font-mono" font-size="8" fill="#777777">LINUX / NETWORKING</text>
  </g>

  <!-- Node 2: Fundamentals -->
  <g class="n2">
    <circle cx="325" cy="100" r="3" fill="#ffffff"/>
    <text x="325" y="80" text-anchor="middle" class="font-sans" font-size="9" fill="#888888">SECURITY FUNDAMENTALS</text>
    <text x="325" y="120" text-anchor="middle" class="font-mono" font-size="8" fill="#777777">MONITORING / LOGS</text>
  </g>

  <!-- Node 3: 2026 (Active) -->
  <g class="n3">
    <!-- Active Diamond Marker -->
    <polygon points="500,94 506,100 500,106 494,100" fill="#d4af37"/>
    <text x="500" y="80" text-anchor="middle" class="font-sans" font-size="14" font-weight="600" fill="#ffffff">2026</text>
    <text x="500" y="120" text-anchor="middle" class="font-mono" font-size="9" font-weight="bold" fill="#d4af37">DFIR / THREAT HUNTING</text>
    <text x="500" y="132" text-anchor="middle" class="font-mono" font-size="8" fill="#aaaaaa">YARA / SIGMA</text>
  </g>

  <!-- Node 4: Future -->
  <g class="n4">
    <circle cx="750" cy="100" r="4" fill="#000000" stroke="#333333" stroke-width="1.5" stroke-dasharray="2 2"/>
    <text x="750" y="80" text-anchor="middle" class="font-sans" font-size="10" font-weight="600" fill="#444444">NEXT</text>
    <text x="750" y="120" text-anchor="middle" class="font-mono" font-size="8" fill="#444444">DETECTION ENG / SOC OPS</text>
  </g>

</svg>
