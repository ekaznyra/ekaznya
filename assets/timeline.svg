<svg viewBox="0 0 900 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06070d"/>
      <stop offset="100%" stop-color="#0b0e1a"/>
    </linearGradient>
    <linearGradient id="completedGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a29bfe"/>
      <stop offset="100%" stop-color="#6c5ce7"/>
    </linearGradient>
    <linearGradient id="currentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffd93d"/>
      <stop offset="100%" stop-color="#f0932b"/>
    </linearGradient>
    <linearGradient id="futureGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e2035" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1e2035" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="divLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a29bfe" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a29bfe" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a29bfe" stop-opacity="0"/>
    </linearGradient>

  </defs>

  <style>
    @keyframes currentPulse {
      0%, 100% { r: 8; opacity: 0.8; }
      50% { r: 12; opacity: 1; }
    }
    @keyframes currentRing {
      0% { r: 15; opacity: 0.4; }
      100% { r: 30; opacity: 0; }
    }
    @keyframes nodeAppear {
      0% { opacity: 0; transform: scale(0); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes lineTrace {
      0% { stroke-dashoffset: 800; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes labelFade {
      0% { opacity: 0; transform: translateY(5px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes futureFlicker {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }
    .current-dot { animation: currentPulse 2.5s ease-in-out infinite; }
    .current-ring { animation: currentRing 2s ease-out infinite; }
    .n1 { animation: nodeAppear 0.4s ease-out 0.3s both; }
    .n2 { animation: nodeAppear 0.4s ease-out 0.6s both; }
    .n3 { animation: nodeAppear 0.4s ease-out 0.9s both; }
    .n4 { animation: nodeAppear 0.4s ease-out 1.2s both; }
    .main-line { stroke-dasharray: 800; animation: lineTrace 2s ease-out both; }
    .l1 { animation: labelFade 0.5s ease-out 0.5s both; }
    .l2 { animation: labelFade 0.5s ease-out 0.8s both; }
    .l3 { animation: labelFade 0.5s ease-out 1.1s both; }
    .l4 { animation: labelFade 0.5s ease-out 1.4s both; }
    .future { animation: futureFlicker 3s ease-in-out infinite; }
    .year-text {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-weight: 700;
      font-size: 14px;
    }
    .desc-text {
      font-family: Consolas, monospace;
      font-size: 8px;
      letter-spacing: 0.5px;
    }
    .section-title {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 10px;
      letter-spacing: 4px;
      fill: #6c5ce7;
      opacity: 0.5;
    }
  </style>

  <rect width="900" height="180" fill="url(#bg)"/>

  <!-- Title -->
  <text x="450" y="22" text-anchor="middle" class="section-title">PROGRESSION</text>
  <rect x="150" y="28" width="600" height="0.5" fill="url(#divLine)"/>

  <!-- Main timeline line -->
  <line x1="80" y1="80" x2="820" y2="80" stroke="#1e2035" stroke-width="2" class="main-line"/>

  <!-- Completed segment (2025) -->
  <line x1="80" y1="80" x2="300" y2="80" stroke="url(#completedGrad)" stroke-width="2.5" opacity="0.7"/>

  <!-- Active segment (2026) -->
  <line x1="300" y1="80" x2="520" y2="80" stroke="url(#currentGrad)" stroke-width="2.5" stroke-dasharray="8 4" opacity="0.7"/>

  <!-- Future segment -->
  <line x1="520" y1="80" x2="750" y2="80" stroke="#1e2035" stroke-width="1.5" stroke-dasharray="3 5" class="future"/>

  <!-- 2025 Node -->
  <g class="n1">
    <circle cx="160" cy="80" r="6" fill="#0b0e1a" stroke="#a29bfe" stroke-width="2"/>
    <circle cx="160" cy="80" r="2.5" fill="#a29bfe" opacity="0.8"/>
  </g>
  <g class="l1">
    <text x="160" y="58" text-anchor="middle" class="year-text" fill="#a29bfe">2025</text>
    <text x="160" y="105" text-anchor="middle" class="desc-text" fill="#565a6e">Linux · Networking</text>
    <text x="160" y="118" text-anchor="middle" class="desc-text" fill="#3d4155">Home Lab · SysAdmin</text>
  </g>

  <!-- Transition node -->
  <g class="n2">
    <circle cx="300" cy="80" r="4" fill="#0b0e1a" stroke="#a29bfe" stroke-width="1.5"/>
    <circle cx="300" cy="80" r="1.5" fill="#a29bfe" opacity="0.6"/>
  </g>
  <g class="l2">
    <text x="300" y="58" text-anchor="middle" class="desc-text" fill="#565a6e" font-size="9" letter-spacing="1">SECURITY FUNDAMENTALS</text>
    <text x="300" y="105" text-anchor="middle" class="desc-text" fill="#3d4155">Monitoring · Log Analysis</text>
  </g>

  <!-- 2026 Current Node (active, pulsing) -->
  <g class="n3">
    <circle cx="480" cy="80" r="0" fill="none" stroke="#ffd93d" stroke-width="0.5" class="current-ring" opacity="0.3"/>
    <circle cx="480" cy="80" r="8" fill="#0b0e1a" stroke="#ffd93d" stroke-width="2.5" class="current-dot"/>
    <circle cx="480" cy="80" r="3" fill="#ffd93d" opacity="0.9"/>
  </g>
  <g class="l3">
    <text x="480" y="52" text-anchor="middle" class="year-text" fill="#ffd93d" font-size="16">2026</text>
    <text x="480" y="42" text-anchor="middle" class="desc-text" fill="#ffd93d" opacity="0.5">◄ NOW</text>
    <text x="480" y="105" text-anchor="middle" class="desc-text" fill="#8b8fa3">DFIR · Threat Hunting</text>
    <text x="480" y="118" text-anchor="middle" class="desc-text" fill="#565a6e">YARA · Sigma · Malware</text>
  </g>

  <!-- NEXT Node -->
  <g class="n4">
    <circle cx="680" cy="80" r="6" fill="#0b0e1a" stroke="#2d3047" stroke-width="1.5" stroke-dasharray="3 2" class="future"/>
  </g>
  <g class="l4">
    <text x="680" y="58" text-anchor="middle" class="year-text future" fill="#2d3047">NEXT</text>
    <text x="680" y="105" text-anchor="middle" class="desc-text future" fill="#2d3047">SOC Operations · BTL1 · CCD</text>
    <text x="680" y="118" text-anchor="middle" class="desc-text future" fill="#1e2035">Open Source · Detection Eng</text>
  </g>

  <!-- End target -->
  <g class="future" opacity="0.3">
    <circle cx="800" cy="80" r="3" fill="none" stroke="#1e2035" stroke-width="1"/>
    <text x="800" y="105" text-anchor="middle" class="desc-text" fill="#1e2035">TARGET</text>
  </g>

  <!-- Bottom decorative line -->
  <rect x="80" y="150" width="740" height="0.5" fill="url(#divLine)" opacity="0.3"/>
  <text x="450" y="168" text-anchor="middle" font-family="Consolas, monospace" font-size="7" fill="#1e2035" letter-spacing="3">
    CONTINUOUS LEARNING · STRUCTURED GROWTH
  </text>
</svg>
