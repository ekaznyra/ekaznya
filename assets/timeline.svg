<svg viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep luxury background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020205"/>
      <stop offset="50%" stop-color="#05060A"/>
      <stop offset="100%" stop-color="#080A12"/>
    </linearGradient>

    <!-- Glowing Path Gradients -->
    <linearGradient id="completedGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff"/><stop offset="100%" stop-color="#6c5ce7"/>
    </linearGradient>
    <linearGradient id="currentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffd700"/><stop offset="100%" stop-color="#ffb86c"/>
    </linearGradient>
    <linearGradient id="divLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00f0ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    @keyframes currentPulse { 0%,100%{r:9; opacity:0.8} 50%{r:12; opacity:1} }
    @keyframes currentRing { 0%{r:18; opacity:0.6; stroke-width:2} 100%{r:40; opacity:0; stroke-width:0.5} }
    @keyframes nodeAppear { 0%{opacity:0; transform:scale(0)} 100%{opacity:1; transform:scale(1)} }
    @keyframes lineTrace { 0%{stroke-dashoffset:800} 100%{stroke-dashoffset:0} }
    @keyframes labelFade { 0%{opacity:0; transform:translateY(10px)} 100%{opacity:1; transform:translateY(0)} }
    @keyframes futureFlicker { 0%,100%{opacity:0.2} 50%{opacity:0.6} }
    @keyframes cornerPulse { 0%,100%{opacity:0.4; stroke:#00f0ff} 50%{opacity:1; stroke:#ffd700} }
    @keyframes scanH { 0%{transform:translateX(-900px)} 100%{transform:translateX(900px)} }
    @keyframes dataFlow { 0%{stroke-dashoffset:20} 100%{stroke-dashoffset:0} }

    .current-dot{animation:currentPulse 2s ease-in-out infinite}
    .current-ring{animation:currentRing 2.5s cubic-bezier(0.2, 0.8, 0.3, 1) infinite}
    
    .n1{animation:nodeAppear 0.5s cubic-bezier(0.1, 0.8, 0.2, 1) 0.3s both}
    .n2{animation:nodeAppear 0.5s cubic-bezier(0.1, 0.8, 0.2, 1) 0.6s both}
    .n3{animation:nodeAppear 0.5s cubic-bezier(0.1, 0.8, 0.2, 1) 0.9s both}
    .n4{animation:nodeAppear 0.5s cubic-bezier(0.1, 0.8, 0.2, 1) 1.2s both}
    
    .main-line{stroke-dasharray:800; animation:lineTrace 2s cubic-bezier(0.2, 0.8, 0.3, 1) both}
    
    .l1{animation:labelFade 0.6s cubic-bezier(0.1, 0.8, 0.2, 1) 0.5s both}
    .l2{animation:labelFade 0.6s cubic-bezier(0.1, 0.8, 0.2, 1) 0.8s both}
    .l3{animation:labelFade 0.6s cubic-bezier(0.1, 0.8, 0.2, 1) 1.1s both}
    .l4{animation:labelFade 0.6s cubic-bezier(0.1, 0.8, 0.2, 1) 1.4s both}
    
    .future{animation:futureFlicker 3s ease-in-out infinite}
    .corner-fx{animation:cornerPulse 2.5s ease-in-out infinite}
    .scan-h{animation:scanH 4s linear infinite}
    .circuit{stroke-dasharray:8 4; animation:dataFlow 1s linear infinite}
    
    .year-text{font-family:'Segoe UI', system-ui, sans-serif; font-weight:900; font-size:16px; letter-spacing:2px}
    .desc-text{font-family:Consolas, monospace; font-size:9px; font-weight:bold; letter-spacing:1px}
    .section-title{font-family:'Segoe UI', system-ui, sans-serif; font-size:11px; font-weight:900; letter-spacing:6px; fill:#00f0ff; opacity:0.9}
    .hud{font-family:Consolas, monospace; font-size:8px; font-weight:bold; letter-spacing:2px; fill:#ffd700}
  </style>

  <rect width="900" height="200" fill="url(#bg)"/>

  <!-- Advanced Grid Background -->
  <g opacity="0.04" stroke="#00f0ff" stroke-width="0.5">
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none"/>
    </pattern>
    <rect width="900" height="200" fill="url(#grid)"/>
  </g>

  <!-- Horizontal Scanning Laser -->
  <rect class="scan-h" x="0" y="0" width="100" height="200" fill="url(#divLine)" opacity="0.1"/>

  <!-- High-Tech HUD Corners -->
  <g class="corner-fx" stroke-width="2" opacity="0.8">
    <path d="M 15 25 L 15 10 L 30 10" fill="none" filter="url(#glow)"/>
    <rect x="13" y="8" width="4" height="4" fill="#ffd700"/>
    <path d="M 885 25 L 885 10 L 870 10" fill="none" filter="url(#glow)"/>
    <rect x="883" y="8" width="4" height="4" fill="#ffd700"/>
    <path d="M 15 175 L 15 190 L 30 190" fill="none" filter="url(#glow)"/>
    <rect x="13" y="188" width="4" height="4" fill="#ffd700"/>
    <path d="M 885 175 L 885 190 L 870 190" fill="none" filter="url(#glow)"/>
    <rect x="883" y="188" width="4" height="4" fill="#ffd700"/>
  </g>

  <!-- Title & Headers -->
  <text x="450" y="25" text-anchor="middle" class="section-title" filter="url(#glow)">PROGRESSION_LOG</text>
  <rect x="150" y="32" width="600" height="1" fill="url(#divLine)"/>
  <rect x="445" y="30" width="10" height="5" fill="#00f0ff" filter="url(#glow)"/>
  
  <text x="30" y="25" class="hud" opacity="0.6">SYS://TIMELINE</text>
  <text x="870" y="25" text-anchor="end" class="hud" opacity="0.6">PATH_VECTOR</text>

  <!-- Main Timeline Axis -->
  <line x1="80" y1="100" x2="820" y2="100" stroke="#080A12" stroke-width="3" class="main-line"/>
  <line x1="80" y1="100" x2="820" y2="100" stroke="#00f0ff" stroke-width="1" class="main-line" opacity="0.3"/>

  <!-- Completed Path -->
  <line x1="80" y1="100" x2="300" y2="100" stroke="url(#completedGrad)" stroke-width="3" filter="url(#glow)"/>

  <!-- Active/Engaged Path -->
  <line x1="300" y1="100" x2="520" y2="100" stroke="url(#currentGrad)" stroke-width="3" stroke-dasharray="10 5" filter="url(#glow)"/>

  <!-- Future Path -->
  <line x1="520" y1="100" x2="750" y2="100" stroke="#ff4757" stroke-width="2" stroke-dasharray="4 6" class="future"/>

  <!-- Data Flow Circuits -->
  <g opacity="0.6">
    <path d="M 160 100 L 160 140 L 180 140" stroke="#00f0ff" stroke-width="1" fill="none" class="circuit"/>
    <path d="M 480 100 L 480 140 L 500 140" stroke="#ffd700" stroke-width="1" fill="none" class="circuit" style="animation-delay:0.5s"/>
    <path d="M 680 100 L 680 140 L 700 140" stroke="#ff4757" stroke-width="1" fill="none" class="circuit" style="animation-delay:1s" class="future"/>
  </g>

  <!-- 2025 Node (Completed) -->
  <g class="n1">
    <circle cx="160" cy="100" r="7" fill="#020205" stroke="#00f0ff" stroke-width="2" filter="url(#glow)"/>
    <circle cx="160" cy="100" r="3" fill="#00f0ff"/>
  </g>
  <g class="l1">
    <text x="160" y="75" text-anchor="middle" class="year-text" fill="#00f0ff" filter="url(#glow)">2025</text>
    <text x="160" y="125" text-anchor="middle" class="desc-text" fill="#e2e8f0">Linux · Networking</text>
    <text x="160" y="140" text-anchor="middle" class="desc-text" fill="#00f0ff" opacity="0.7">Home Lab · SysAdmin</text>
  </g>

  <!-- Intermediate Node (Transition) -->
  <g class="n2">
    <circle cx="300" cy="100" r="5" fill="#020205" stroke="#6c5ce7" stroke-width="2"/>
    <circle cx="300" cy="100" r="2" fill="#6c5ce7" filter="url(#glow)"/>
  </g>
  <g class="l2">
    <text x="300" y="75" text-anchor="middle" class="desc-text" fill="#a29bfe" letter-spacing="2">SECURITY FUNDAMENTALS</text>
    <text x="300" y="125" text-anchor="middle" class="desc-text" fill="#e2e8f0">Monitoring · Log Analysis</text>
  </g>

  <!-- 2026 Node (Active/Current) -->
  <g class="n3">
    <!-- Expanding Pulse Rings -->
    <circle cx="480" cy="100" fill="none" stroke="#ffd700" class="current-ring"/>
    <circle cx="480" cy="100" r="10" fill="#020205" stroke="#ffd700" stroke-width="3" class="current-dot" filter="url(#glowStrong)"/>
    <circle cx="480" cy="100" r="4" fill="#ffffff" filter="url(#glow)"/>
  </g>
  <g class="l3">
    <rect x="445" y="45" width="70" height="14" rx="2" fill="#ffd700" opacity="0.1"/>
    <text x="480" y="55" text-anchor="middle" class="desc-text" fill="#ffd700" letter-spacing="2">◄ ACTIVE</text>
    <text x="480" y="75" text-anchor="middle" class="year-text" fill="#ffd700" font-size="20" filter="url(#glowStrong)">2026</text>
    
    <text x="480" y="125" text-anchor="middle" class="desc-text" fill="#ffffff">DFIR · Threat Hunting</text>
    <text x="480" y="140" text-anchor="middle" class="desc-text" fill="#ffd700" opacity="0.8">YARA · Sigma · Malware</text>
  </g>

  <!-- NEXT Node (Future) -->
  <g class="n4">
    <circle cx="680" cy="100" r="7" fill="#020205" stroke="#ff4757" stroke-width="2" stroke-dasharray="4 2" class="future"/>
  </g>
  <g class="l4">
    <text x="680" y="75" text-anchor="middle" class="year-text future" fill="#ff4757">NEXT_</text>
    <text x="680" y="125" text-anchor="middle" class="desc-text future" fill="#e2e8f0">SOC Operations · BTL1 · CCD</text>
    <text x="680" y="140" text-anchor="middle" class="desc-text future" fill="#ff4757">Open Source · Detection Eng</text>
  </g>

  <!-- End Target -->
  <g class="future" opacity="0.5">
    <path d="M 800 100 L 790 90 L 810 90 Z" fill="none" stroke="#ff4757" stroke-width="1.5"/>
    <circle cx="800" cy="100" r="12" fill="none" stroke="#ff4757" stroke-width="1"/>
    <text x="800" y="125" text-anchor="middle" class="desc-text" fill="#ff4757">OBJECTIVE</text>
  </g>

  <!-- Bottom Tech Footer -->
  <rect x="80" y="175" width="740" height="1" fill="url(#divLine)" opacity="0.4"/>
  <rect x="445" y="174" width="10" height="3" fill="#00f0ff" filter="url(#glow)"/>
  <text x="450" y="185" text-anchor="middle" font-family="Consolas, monospace" font-size="8" fill="#00f0ff" letter-spacing="4" opacity="0.7">
    CONTINUOUS LEARNING // STRUCTURED GROWTH
  </text>
</svg>
