<svg viewBox="0 0 900 40" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b89b5e"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes moveDash {
      0% { transform: translateX(0); }
      100% { transform: translateX(900px); }
    }
    .dash { animation: moveDash 8s linear infinite; }
  </style>
  <rect width="900" height="40" fill="transparent"/>
  <line x1="0" y1="20" x2="900" y2="20" stroke="#1a1a1a" stroke-width="0.5"/>
  <rect class="dash" x="-20" y="19" width="20" height="2" fill="url(#gold)"/>
</svg>
