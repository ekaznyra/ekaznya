<svg viewBox="0 0 900 40" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6c5ce7" stop-opacity="0"/>
      <stop offset="20%" stop-color="#a29bfe" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#6c5ce7" stop-opacity="0.8"/>
      <stop offset="80%" stop-color="#a29bfe" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#6c5ce7" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes dotFloat {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.8; }
    }
    @keyframes lineShimmer {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }
    .wave { animation: lineShimmer 3s ease-in-out infinite; }
    .d1 { animation: dotFloat 2s ease-in-out infinite; }
    .d2 { animation: dotFloat 2s ease-in-out infinite 0.5s; }
    .d3 { animation: dotFloat 2s ease-in-out infinite 1s; }
    .d4 { animation: dotFloat 2s ease-in-out infinite 1.5s; }
  </style>
  <rect width="900" height="40" fill="transparent"/>
  <!-- Static wave path with shimmer animation -->
  <path class="wave" d="M0,20 Q50,8 100,20 Q150,32 200,20 Q250,8 300,20 Q350,32 400,20 Q450,8 500,20 Q550,32 600,20 Q650,8 700,20 Q750,32 800,20 Q850,8 900,20" fill="none" stroke="url(#waveGrad)" stroke-width="1"/>
  <!-- Signal dots -->
  <circle cx="200" cy="20" r="1.5" fill="#a29bfe" class="d1"/>
  <circle cx="400" cy="20" r="1.5" fill="#6c5ce7" class="d2"/>
  <circle cx="600" cy="20" r="1.5" fill="#a29bfe" class="d3"/>
  <circle cx="800" cy="20" r="1.5" fill="#6c5ce7" class="d4"/>
</svg>
