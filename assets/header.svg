<svg viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep Cosmic Background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020105"/>
      <stop offset="50%" stop-color="#06050b"/>
      <stop offset="100%" stop-color="#030305"/>
    </linearGradient>

    <!-- Milky Way Dust Gradients -->
    <radialGradient id="dust1" cx="30%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dust2" cx="70%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#6c5ce7" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#6c5ce7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dust3" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Subtle metallic accent -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b89b5e"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#8a733f"/>
    </linearGradient>

    <filter id="starGlow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    @keyframes slowRotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes slowRotateRev { 0% { transform: rotate(360deg); } 100% { transform: rotate(0deg); } }
    @keyframes fadeUp { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
    @keyframes driftStars { 0% { transform: translateX(0) translateY(0); } 100% { transform: translateX(-20px) translateY(-10px); } }
    @keyframes drawLine { 0% { stroke-dashoffset: 400; } 100% { stroke-dashoffset: 0; } }

    .f1 { animation: fadeUp 1.5s cubic-bezier(0.1, 0.8, 0.2, 1) 0.5s both; }
    .f2 { animation: fadeUp 1.5s cubic-bezier(0.1, 0.8, 0.2, 1) 0.8s both; }
    .f3 { animation: fadeUp 1.5s cubic-bezier(0.1, 0.8, 0.2, 1) 1.1s both; }
    
    .rot1 { transform-origin: 700px 200px; animation: slowRotate 40s linear infinite; }
    .rot2 { transform-origin: 700px 200px; animation: slowRotateRev 60s linear infinite; }
    .rot3 { transform-origin: 700px 200px; animation: slowRotate 80s linear infinite; }
    
    .tw { animation: twinkle 4s ease-in-out infinite; }
    .tw2 { animation: twinkle 5s ease-in-out infinite 1s; }
    .tw3 { animation: twinkle 6s ease-in-out infinite 2s; }
    
    .star-drift { animation: driftStars 60s linear infinite alternate; }

    .draw { stroke-dasharray: 400; animation: drawLine 2s cubic-bezier(0.2, 0.8, 0.3, 1) 1s both; }

    .font-sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    .font-mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; }
  </style>

  <!-- Deep Space Base -->
  <rect width="900" height="400" fill="url(#bg)"/>

  <!-- Milky Way Cosmic Dust -->
  <rect width="900" height="400" fill="url(#dust3)"/>
  <ellipse cx="250" cy="100" rx="300" ry="150" fill="url(#dust1)" transform="rotate(-15 250 100)"/>
  <ellipse cx="650" cy="300" rx="400" ry="200" fill="url(#dust2)" transform="rotate(-25 650 300)"/>

  <!-- Starfield Layer (Drifting) -->
  <g class="star-drift">
    <!-- Tiny background stars -->
    <g fill="#ffffff" opacity="0.4">
      <circle cx="50" cy="150" r="0.5"/><circle cx="120" cy="40" r="0.8"/><circle cx="280" cy="300" r="0.6"/>
      <circle cx="450" cy="80" r="0.5"/><circle cx="600" cy="250" r="0.9"/><circle cx="850" cy="120" r="0.7"/>
      <circle cx="700" cy="380" r="0.5"/><circle cx="350" cy="180" r="0.8"/><circle cx="80" cy="350" r="0.6"/>
      <circle cx="520" cy="320" r="0.5"/><circle cx="780" cy="40" r="0.8"/><circle cx="900" cy="280" r="0.6"/>
      <circle cx="150" cy="220" r="0.7"/><circle cx="320" cy="90" r="0.5"/><circle cx="680" cy="140" r="0.8"/>
      <circle cx="20" cy="20" r="0.5"/><circle cx="400" cy="380" r="0.6"/><circle cx="820" cy="200" r="0.7"/>
    </g>
    <!-- Twinkling stars (Gold & Silver) -->
    <circle cx="180" cy="80" r="1.5" fill="#ffffff" class="tw" filter="url(#starGlow)"/>
    <circle cx="620" cy="60" r="1.5" fill="#d4af37" class="tw2" filter="url(#starGlow)"/>
    <circle cx="250" cy="350" r="1.2" fill="#d4af37" class="tw3" filter="url(#starGlow)"/>
    <circle cx="800" cy="320" r="1.8" fill="#ffffff" class="tw" filter="url(#starGlow)"/>
    <circle cx="480" cy="150" r="1" fill="#6c5ce7" class="tw2" filter="url(#starGlow)"/>
    <circle cx="380" cy="280" r="1.5" fill="#ffffff" class="tw3" filter="url(#starGlow)"/>
  </g>

  <!-- Constellation / Networking Lines -->
  <g stroke="#ffffff" stroke-width="0.2" opacity="0.15">
    <line x1="180" y1="80" x2="320" y2="90"/>
    <line x1="320" y1="90" x2="480" y2="150"/>
    <line x1="480" y1="150" x2="620" y2="60"/>
    <line x1="620" y1="60" x2="850" y2="120"/>
    <line x1="250" y1="350" x2="380" y2="280"/>
    <line x1="380" y1="280" x2="520" y2="320"/>
    <line x1="520" y1="320" x2="700" y2="380"/>
    <line x1="700" y1="380" x2="800" y2="320"/>
  </g>

  <!-- Left Side: Identity -->
  <g class="f1">
    <text x="100" y="160" class="font-sans" font-weight="300" font-size="12" fill="#aaaaaa" letter-spacing="8">
      IDENTITY / DOSSIER
    </text>
    
    <text x="96" y="220" class="font-sans" font-weight="200" font-size="52" fill="#ffffff" letter-spacing="1">
      NGUYỄN NGỌC
    </text>
    <text x="96" y="275" class="font-sans" font-weight="600" font-size="52" fill="#ffffff" letter-spacing="1">
      ANH TÚ
    </text>
  </g>

  <!-- Accent Line -->
  <g class="f2">
    <line x1="100" y1="305" x2="300" y2="305" stroke="url(#gold)" stroke-width="1" class="draw"/>
    <rect x="100" y="303" width="4" height="4" fill="url(#gold)"/>
  </g>

  <!-- Role Details -->
  <g class="f3">
    <text x="100" y="330" class="font-mono" font-size="10" fill="#d4af37" letter-spacing="2">
      CYBERSECURITY · DFIR · DETECTION ENGINEERING
    </text>
  </g>

  <!-- Right Side: Abstract Geometric Astrolabe -->
  <g class="f2">
    <!-- Center Node -->
    <circle cx="700" cy="200" r="3" fill="url(#gold)" filter="url(#starGlow)"/>
    <circle cx="700" cy="200" r="10" fill="none" stroke="#6c5ce7" stroke-width="0.5" opacity="0.5"/>
    
    <!-- Inner Abstract Ring -->
    <g class="rot1">
      <circle cx="700" cy="200" r="45" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.3"/>
      <path d="M 700 155 A 45 45 0 0 1 745 200" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
      <circle cx="700" cy="155" r="2.5" fill="#ffffff"/>
    </g>

    <!-- Mid Abstract Ring -->
    <g class="rot2">
      <circle cx="700" cy="200" r="90" fill="none" stroke="#ffffff" stroke-width="0.3" stroke-dasharray="2 6" opacity="0.4"/>
      <path d="M 610 200 A 90 90 0 0 0 700 290" fill="none" stroke="#6c5ce7" stroke-width="1"/>
      <rect x="608" y="198" width="4" height="4" fill="#ffffff" transform="rotate(45 610 200)"/>
    </g>

    <!-- Outer Abstract Ring -->
    <g class="rot3">
      <circle cx="700" cy="200" r="145" fill="none" stroke="#ffffff" stroke-width="0.2" opacity="0.2"/>
      <path d="M 700 55 A 145 145 0 0 1 845 200" fill="none" stroke="url(#gold)" stroke-width="0.8"/>
      <circle cx="700" cy="55" r="2" fill="url(#gold)" filter="url(#starGlow)"/>
      <!-- Data ticks -->
      <line x1="700" y1="50" x2="700" y2="60" stroke="#ffffff" stroke-width="0.5" opacity="0.5"/>
      <line x1="700" y1="340" x2="700" y2="350" stroke="#ffffff" stroke-width="0.5" opacity="0.5"/>
      <line x1="550" y1="200" x2="560" y2="200" stroke="#ffffff" stroke-width="0.5" opacity="0.5"/>
      <line x1="840" y1="200" x2="850" y2="200" stroke="#ffffff" stroke-width="0.5" opacity="0.5"/>
    </g>
    
    <!-- Fixed Geometric Overlays -->
    <line x1="530" y1="200" x2="870" y2="200" stroke="#ffffff" stroke-width="0.2" opacity="0.3"/>
    <line x1="700" y1="30" x2="700" y2="370" stroke="#ffffff" stroke-width="0.2" opacity="0.3"/>
  </g>

  <!-- Top / Bottom Metadata -->
  <g class="f1" opacity="0.8">
    <text x="30" y="30" class="font-mono" font-size="8" fill="#888888" letter-spacing="1">OP_ID: EKAZNYRA</text>
    <text x="870" y="30" text-anchor="end" class="font-mono" font-size="8" fill="#888888" letter-spacing="1">CLEARANCE: V</text>
    <text x="30" y="380" class="font-mono" font-size="8" fill="#888888" letter-spacing="1">SYS_ACTIVE</text>
    <text x="870" y="380" text-anchor="end" class="font-mono" font-size="8" fill="#888888" letter-spacing="1">LOC: 127.0.0.1</text>
  </g>
</svg>
