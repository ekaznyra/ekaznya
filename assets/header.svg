<svg viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient definitions -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06070d"/>
      <stop offset="50%" stop-color="#0b0e1a"/>
      <stop offset="100%" stop-color="#080a14"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6c5ce7" stop-opacity="0"/>
      <stop offset="50%" stop-color="#6c5ce7" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#6c5ce7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a29bfe" stop-opacity="0"/>
      <stop offset="20%" stop-color="#a29bfe" stop-opacity="0.4"/>
      <stop offset="80%" stop-color="#6c5ce7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#6c5ce7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="50%" stop-color="#f8f9fb"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6c5ce7" stop-opacity="0"/>
      <stop offset="30%" stop-color="#a29bfe" stop-opacity="0.3"/>
      <stop offset="70%" stop-color="#6c5ce7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6c5ce7" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="orbGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a29bfe" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a29bfe" stop-opacity="0"/>
    </radialGradient>



  </defs>

  <style>
    @keyframes drift {
      0%, 100% { transform: translateY(0px); opacity: 0.3; }
      50% { transform: translateY(-8px); opacity: 0.8; }
    }
    @keyframes drift2 {
      0%, 100% { transform: translateY(0px) translateX(0px); opacity: 0.2; }
      33% { transform: translateY(-5px) translateX(3px); opacity: 0.6; }
      66% { transform: translateY(3px) translateX(-2px); opacity: 0.4; }
    }
    @keyframes orbitSlow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes orbitReverse {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }
    @keyframes fadeSlideUp {
      0% { opacity: 0; transform: translateY(15px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulseRing {
      0% { r: 40; opacity: 0.3; }
      50% { r: 55; opacity: 0; }
      100% { r: 40; opacity: 0.3; }
    }
    @keyframes scanVertical {
      0% { transform: translateY(-400px); }
      100% { transform: translateY(400px); }
    }
    @keyframes shimmer {
      0% { transform: translateX(-900px); }
      100% { transform: translateX(900px); }
    }
    @keyframes breathe {
      0%, 100% { opacity: 0.04; }
      50% { opacity: 0.08; }
    }
    @keyframes particleFade {
      0%, 100% { opacity: 0; r: 0.5; }
      50% { opacity: 0.7; r: 1.5; }
    }
    @keyframes hexRotate {
      0% { transform: rotate(0deg); opacity: 0.06; }
      50% { opacity: 0.12; }
      100% { transform: rotate(60deg); opacity: 0.06; }
    }
    @keyframes lineTrace {
      0% { stroke-dashoffset: 600; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes statusBlink {
      0%, 40% { opacity: 1; }
      50%, 90% { opacity: 0.3; }
      100% { opacity: 1; }
    }
    .p1 { animation: drift 6s ease-in-out infinite; }
    .p2 { animation: drift 8s ease-in-out infinite 1s; }
    .p3 { animation: drift2 7s ease-in-out infinite 0.5s; }
    .p4 { animation: drift 9s ease-in-out infinite 2s; }
    .p5 { animation: drift2 5s ease-in-out infinite 1.5s; }
    .p6 { animation: drift 10s ease-in-out infinite 3s; }
    .p7 { animation: drift2 6.5s ease-in-out infinite 0.8s; }
    .p8 { animation: drift 7.5s ease-in-out infinite 2.5s; }
    .p9 { animation: particleFade 4s ease-in-out infinite; }
    .p10 { animation: particleFade 5s ease-in-out infinite 1s; }
    .p11 { animation: particleFade 6s ease-in-out infinite 2s; }
    .p12 { animation: particleFade 4.5s ease-in-out infinite 0.5s; }
    .p13 { animation: particleFade 5.5s ease-in-out infinite 1.5s; }
    .orbit1 { transform-origin: 740px 200px; animation: orbitSlow 20s linear infinite; }
    .orbit2 { transform-origin: 740px 200px; animation: orbitReverse 15s linear infinite; }
    .orbit3 { transform-origin: 740px 200px; animation: orbitSlow 25s linear infinite; }
    .fade1 { animation: fadeSlideUp 0.8s ease-out 0.3s both; }
    .fade2 { animation: fadeSlideUp 0.8s ease-out 0.6s both; }
    .fade3 { animation: fadeSlideUp 0.8s ease-out 0.9s both; }
    .fade4 { animation: fadeSlideUp 0.8s ease-out 1.2s both; }
    .fade5 { animation: fadeSlideUp 0.8s ease-out 1.5s both; }
    .scan { animation: scanVertical 6s linear infinite; }
    .shimmer-bar { animation: shimmer 4s ease-in-out infinite; }
    .breathe { animation: breathe 4s ease-in-out infinite; }
    .hex-spin { transform-origin: center; animation: hexRotate 12s linear infinite; }
    .trace { stroke-dasharray: 600; animation: lineTrace 3s ease-out both; }
    .trace2 { stroke-dasharray: 600; animation: lineTrace 3s ease-out 0.5s both; }
    .status-dot { animation: statusBlink 2s ease-in-out infinite; }
    .pulse-ring { animation: pulseRing 3s ease-out infinite; }
  </style>

  <!-- Background -->
  <rect width="900" height="400" fill="url(#bgGrad)"/>

  <!-- Atmospheric haze orbs -->
  <circle cx="200" cy="180" r="120" fill="url(#orbGlow)" class="breathe"/>
  <circle cx="700" cy="200" r="150" fill="url(#orbGlow)" class="breathe" style="animation-delay: 2s"/>
  <circle cx="450" cy="350" r="100" fill="url(#orbGlow)" class="breathe" style="animation-delay: 1s"/>

  <!-- Subtle hex grid pattern (unique, not the generic square grid) -->
  <g opacity="0.03" stroke="#a29bfe" stroke-width="0.3" fill="none" class="hex-spin">
    <polygon points="450,50 480,67 480,100 450,117 420,100 420,67"/>
    <polygon points="450,130 480,147 480,180 450,197 420,180 420,147"/>
    <polygon points="380,90 410,107 410,140 380,157 350,140 350,107"/>
    <polygon points="520,90 550,107 550,140 520,157 490,140 490,107"/>
    <polygon points="380,170 410,187 410,220 380,237 350,220 350,187"/>
    <polygon points="520,170 550,187 550,220 520,237 490,220 490,187"/>
    <polygon points="310,130 340,147 340,180 310,197 280,180 280,147"/>
    <polygon points="590,130 620,147 620,180 590,197 560,180 560,147"/>
  </g>

  <!-- Scan line effect -->
  <rect class="scan" x="0" y="0" width="900" height="3" fill="url(#accentGrad)" opacity="0.15"/>

  <!-- Floating particles constellation -->
  <g>
    <circle cx="80" cy="90" r="1.2" fill="#a29bfe" class="p1"/>
    <circle cx="150" cy="60" r="0.8" fill="#6c5ce7" class="p2"/>
    <circle cx="230" cy="120" r="1" fill="#c4b5fd" class="p3"/>
    <circle cx="310" cy="45" r="0.6" fill="#a29bfe" class="p4"/>
    <circle cx="400" cy="85" r="1.1" fill="#6c5ce7" class="p5"/>
    <circle cx="500" cy="55" r="0.7" fill="#c4b5fd" class="p6"/>
    <circle cx="560" cy="100" r="0.9" fill="#a29bfe" class="p7"/>
    <circle cx="650" cy="70" r="1" fill="#6c5ce7" class="p8"/>
    <circle cx="120" cy="300" r="1" fill="#a29bfe" class="p9"/>
    <circle cx="280" cy="330" r="0.8" fill="#c4b5fd" class="p10"/>
    <circle cx="420" cy="350" r="1.2" fill="#6c5ce7" class="p11"/>
    <circle cx="560" cy="320" r="0.7" fill="#a29bfe" class="p12"/>
    <circle cx="700" cy="340" r="0.9" fill="#c4b5fd" class="p13"/>
    <!-- Constellation lines between particles -->
    <line x1="80" y1="90" x2="150" y2="60" stroke="#a29bfe" stroke-width="0.2" opacity="0.15"/>
    <line x1="150" y1="60" x2="230" y2="120" stroke="#a29bfe" stroke-width="0.2" opacity="0.1"/>
    <line x1="230" y1="120" x2="310" y2="45" stroke="#6c5ce7" stroke-width="0.2" opacity="0.1"/>
    <line x1="400" y1="85" x2="500" y2="55" stroke="#6c5ce7" stroke-width="0.2" opacity="0.12"/>
    <line x1="500" y1="55" x2="560" y2="100" stroke="#a29bfe" stroke-width="0.2" opacity="0.1"/>
    <line x1="560" y1="100" x2="650" y2="70" stroke="#c4b5fd" stroke-width="0.2" opacity="0.08"/>
    <line x1="120" y1="300" x2="280" y2="330" stroke="#a29bfe" stroke-width="0.2" opacity="0.1"/>
    <line x1="420" y1="350" x2="560" y2="320" stroke="#6c5ce7" stroke-width="0.2" opacity="0.08"/>
  </g>

  <!-- Left side: Identity block -->
  <g class="fade1">
    <!-- Thin accent line -->
    <line x1="50" y1="70" x2="50" y2="340" stroke="url(#lineGrad)" stroke-width="1" class="trace" opacity="0.5"/>
    <circle cx="50" cy="70" r="2" fill="#a29bfe" opacity="0.6"/>
    <circle cx="50" cy="340" r="2" fill="#6c5ce7" opacity="0.4"/>
  </g>

  <!-- Name -->
  <g class="fade2">
    <text x="75" y="120" font-family="'Segoe UI', system-ui, sans-serif" font-weight="200" font-size="13" fill="#6c5ce7" letter-spacing="6" opacity="0.7">
      IDENTITY
    </text>
    <text x="75" y="170" font-family="'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="42" fill="url(#nameGrad)">
      NGUYỄN NGỌC
    </text>
    <text x="75" y="220" font-family="'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="42" fill="url(#nameGrad)">
      ANH TÚ
    </text>
  </g>

  <!-- Role line -->
  <g class="fade3">
    <line x1="75" y1="240" x2="200" y2="240" stroke="#6c5ce7" stroke-width="0.5" opacity="0.4" class="trace2"/>
    <text x="75" y="268" font-family="Consolas, monospace" font-weight="300" font-size="13" fill="#8b8fa3" letter-spacing="1">
      Cybersecurity · DFIR · Detection Engineering
    </text>
  </g>

  <!-- Status indicators -->
  <g class="fade4">
    <circle cx="83" cy="305" r="3" fill="#a29bfe" class="status-dot"/>
    <text x="95" y="309" font-family="Consolas, monospace" font-size="10" fill="#565a6e" letter-spacing="0.5">
      investigating threats · building detections
    </text>
  </g>

  <!-- Right side: Orbital system (unique visual element) -->
  <g class="fade5">
    <!-- Outer orbital ring -->
    <g class="orbit1">
      <circle cx="740" cy="200" r="110" fill="none" stroke="#6c5ce7" stroke-width="0.3" opacity="0.15"/>
      <circle cx="740" cy="90" r="3" fill="#a29bfe" opacity="0.5"/>
      <circle cx="850" cy="200" r="2" fill="#6c5ce7" opacity="0.4"/>
    </g>

    <!-- Middle orbital ring -->
    <g class="orbit2">
      <circle cx="740" cy="200" r="75" fill="none" stroke="#a29bfe" stroke-width="0.3" opacity="0.12"/>
      <circle cx="740" cy="125" r="2.5" fill="#c4b5fd" opacity="0.5"/>
      <circle cx="665" cy="200" r="2" fill="#a29bfe" opacity="0.3"/>
    </g>

    <!-- Inner orbital ring -->
    <g class="orbit3">
      <circle cx="740" cy="200" r="40" fill="none" stroke="#c4b5fd" stroke-width="0.4" opacity="0.1"/>
      <circle cx="740" cy="160" r="2" fill="#a29bfe" opacity="0.6"/>
    </g>

    <!-- Center core -->
    <circle cx="740" cy="200" r="6" fill="#0b0e1a" stroke="#a29bfe" stroke-width="1.5" opacity="0.6"/>
    <circle cx="740" cy="200" r="2" fill="#a29bfe" opacity="0.8"/>
    <circle cx="740" cy="200" r="0" fill="none" stroke="#a29bfe" stroke-width="0.5" class="pulse-ring"/>

    <!-- Orbital labels -->
    <text x="740" y="320" text-anchor="middle" font-family="Consolas, monospace" font-size="8" fill="#3d4155" letter-spacing="3">
      THREAT LANDSCAPE
    </text>

    <!-- Skill nodes around orbit -->
    <g opacity="0.7">
      <text x="640" y="135" text-anchor="middle" font-family="Consolas, monospace" font-size="8" fill="#ff6b9d" letter-spacing="1">DFIR</text>
      <text x="835" y="165" text-anchor="end" font-family="Consolas, monospace" font-size="8" fill="#ffd93d" letter-spacing="1">HUNT</text>
      <text x="835" y="250" text-anchor="end" font-family="Consolas, monospace" font-size="8" fill="#4ecdc4" letter-spacing="1">DETECT</text>
      <text x="640" y="280" text-anchor="middle" font-family="Consolas, monospace" font-size="8" fill="#a29bfe" letter-spacing="1">ANALYZE</text>
    </g>
  </g>

  <!-- Bottom accent line -->
  <g class="fade5">
    <rect x="50" y="375" width="800" height="1" fill="url(#accentGrad)" opacity="0.3"/>
    <text x="450" y="393" text-anchor="middle" font-family="Consolas, monospace" font-size="8" fill="#2d3047" letter-spacing="4">
      OBSERVE · INVESTIGATE · DOCUMENT · IMPROVE
    </text>
  </g>

  <!-- Shimmer overlay -->
  <rect class="shimmer-bar" x="0" y="0" width="60" height="400" fill="url(#accentGrad)" opacity="0.03"/>
</svg>
