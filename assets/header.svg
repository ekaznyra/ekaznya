<svg viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- True Black Background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#030303"/>
    </linearGradient>

    <!-- Subtle metallic accent -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b89b5e"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#8a733f"/>
    </linearGradient>
  </defs>

  <style>
    @keyframes slowRotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes slowRotateRev {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }
    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulseOpacity {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.8; }
    }
    @keyframes drawLine {
      0% { stroke-dashoffset: 400; }
      100% { stroke-dashoffset: 0; }
    }

    .f1 { animation: fadeUp 1.5s cubic-bezier(0.1, 0.8, 0.2, 1) 0.5s both; }
    .f2 { animation: fadeUp 1.5s cubic-bezier(0.1, 0.8, 0.2, 1) 0.8s both; }
    .f3 { animation: fadeUp 1.5s cubic-bezier(0.1, 0.8, 0.2, 1) 1.1s both; }
    
    .rot1 { transform-origin: 700px 200px; animation: slowRotate 40s linear infinite; }
    .rot2 { transform-origin: 700px 200px; animation: slowRotateRev 60s linear infinite; }
    .rot3 { transform-origin: 700px 200px; animation: slowRotate 80s linear infinite; }
    
    .pulse { animation: pulseOpacity 4s ease-in-out infinite; }
    .draw { stroke-dasharray: 400; animation: drawLine 2s cubic-bezier(0.2, 0.8, 0.3, 1) 1s both; }

    .font-sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    .font-mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; }
  </style>

  <rect width="900" height="400" fill="url(#bg)"/>

  <!-- Minimalist Architectural Grid (Extremely subtle) -->
  <g stroke="#111111" stroke-width="0.5">
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="0" y1="50" x2="900" y2="50"/>
    <line x1="0" y1="350" x2="900" y2="350"/>
  </g>

  <!-- Left Side: Identity -->
  <g class="f1">
    <text x="100" y="160" class="font-sans" font-weight="300" font-size="12" fill="#555555" letter-spacing="8">
      IDENTITY / DOSSIER
    </text>
    
    <text x="96" y="220" class="font-sans" font-weight="200" font-size="52" fill="#ffffff" letter-spacing="1">
      NGUYỄN NGỌC
    </text>
    <text x="96" y="275" class="font-sans" font-weight="600" font-size="52" fill="#ffffff" letter-spacing="1">
      ANH TÚ
    </text>
  </g>

  <!-- Accent Line -->
  <g class="f2">
    <line x1="100" y1="305" x2="300" y2="305" stroke="url(#gold)" stroke-width="1" class="draw"/>
    <rect x="100" y="303" width="4" height="4" fill="url(#gold)"/>
  </g>

  <!-- Role Details -->
  <g class="f3">
    <text x="100" y="330" class="font-mono" font-size="10" fill="#888888" letter-spacing="2">
      CYBERSECURITY · DFIR · DETECTION ENGINEERING
    </text>
  </g>

  <!-- Right Side: Abstract Geometric Data Visual -->
  <g class="f2">
    <!-- Center Node -->
    <circle cx="700" cy="200" r="2" fill="url(#gold)"/>
    <circle cx="700" cy="200" r="8" fill="none" stroke="#333333" stroke-width="0.5"/>
    
    <!-- Inner Abstract Ring -->
    <g class="rot1">
      <circle cx="700" cy="200" r="40" fill="none" stroke="#222222" stroke-width="0.5"/>
      <path d="M 700 160 A 40 40 0 0 1 740 200" fill="none" stroke="#555555" stroke-width="1"/>
      <circle cx="700" cy="160" r="2" fill="#ffffff"/>
    </g>

    <!-- Mid Abstract Ring -->
    <g class="rot2">
      <circle cx="700" cy="200" r="80" fill="none" stroke="#1a1a1a" stroke-width="0.5" stroke-dasharray="2 4"/>
      <path d="M 620 200 A 80 80 0 0 0 700 280" fill="none" stroke="#444444" stroke-width="1"/>
      <rect x="618" y="198" width="4" height="4" fill="#555555" transform="rotate(45 620 200)"/>
    </g>

    <!-- Outer Abstract Ring -->
    <g class="rot3">
      <circle cx="700" cy="200" r="130" fill="none" stroke="#151515" stroke-width="0.5"/>
      <path d="M 700 70 A 130 130 0 0 1 830 200" fill="none" stroke="url(#gold)" stroke-width="0.5"/>
      <circle cx="700" cy="70" r="1.5" fill="url(#gold)" class="pulse"/>
      <!-- Data ticks -->
      <line x1="700" y1="65" x2="700" y2="75" stroke="#333333" stroke-width="0.5"/>
      <line x1="700" y1="325" x2="700" y2="335" stroke="#333333" stroke-width="0.5"/>
      <line x1="565" y1="200" x2="575" y2="200" stroke="#333333" stroke-width="0.5"/>
      <line x1="825" y1="200" x2="835" y2="200" stroke="#333333" stroke-width="0.5"/>
    </g>
    
    <!-- Fixed Geometric Overlays -->
    <line x1="550" y1="200" x2="850" y2="200" stroke="#111111" stroke-width="0.5"/>
    <line x1="700" y1="50" x2="700" y2="350" stroke="#111111" stroke-width="0.5"/>
  </g>

  <!-- Top / Bottom Metadata -->
  <g class="f1" opacity="0.6">
    <text x="30" y="30" class="font-mono" font-size="8" fill="#555555" letter-spacing="1">OP_ID: EKAZNYRA</text>
    <text x="870" y="30" text-anchor="end" class="font-mono" font-size="8" fill="#555555" letter-spacing="1">CLEARANCE: V</text>
    <text x="30" y="380" class="font-mono" font-size="8" fill="#555555" letter-spacing="1">SYS_ACTIVE</text>
    <text x="870" y="380" text-anchor="end" class="font-mono" font-size="8" fill="#555555" letter-spacing="1">LOC: 127.0.0.1</text>
  </g>
</svg>
