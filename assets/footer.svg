<svg viewBox="0 0 900 110" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020205"/><stop offset="100%" stop-color="#080A12"/>
    </linearGradient>
    <linearGradient id="divLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffd700" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00f0ff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    @keyframes cursorBlink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
    @keyframes fadeInUp { 0%{opacity:0;transform:translateY(10px)} 100%{opacity:1;transform:translateY(0)} }
    @keyframes shimmer { 0%{transform:translateX(-300px)} 100%{transform:translateX(900px)} }
    @keyframes cornerPulse { 0%,100%{opacity:0.4; stroke:#00f0ff} 50%{opacity:1; stroke:#ffd700} }
    @keyframes dataFlow { 0%{stroke-dashoffset:16} 100%{stroke-dashoffset:0} }
    
    .cursor{animation:cursorBlink 1s step-end infinite}
    .f1{animation:fadeInUp 0.8s cubic-bezier(0.1, 0.8, 0.2, 1) 0.3s both}
    .f2{animation:fadeInUp 0.8s cubic-bezier(0.1, 0.8, 0.2, 1) 0.6s both}
    .f3{animation:fadeInUp 0.8s cubic-bezier(0.1, 0.8, 0.2, 1) 0.9s both}
    
    .shimmer-line{animation:shimmer 5s ease-in-out infinite}
    .corner-fx{animation:cornerPulse 3s ease-in-out infinite}
    .circuit{stroke-dasharray:8 4;animation:dataFlow 1s linear infinite}
  </style>

  <rect width="900" height="110" fill="url(#bg)"/>

  <!-- High-Tech Grid -->
  <g opacity="0.04" stroke="#00f0ff" stroke-width="0.5">
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none"/>
    </pattern>
    <rect width="900" height="110" fill="url(#grid)"/>
  </g>

  <!-- HUD Corners -->
  <g class="corner-fx" stroke-width="1.5" opacity="0.8">
    <path d="M 15 20 L 15 10 L 25 10" fill="none" filter="url(#glow)"/>
    <rect x="13" y="8" width="4" height="4" fill="#ffd700"/>
    <path d="M 885 20 L 885 10 L 875 10" fill="none" filter="url(#glow)"/>
    <rect x="883" y="8" width="4" height="4" fill="#ffd700"/>
    <path d="M 15 90 L 15 100 L 25 100" fill="none" filter="url(#glow)"/>
    <rect x="13" y="98" width="4" height="4" fill="#ffd700"/>
    <path d="M 885 90 L 885 100 L 875 100" fill="none" filter="url(#glow)"/>
    <rect x="883" y="98" width="4" height="4" fill="#ffd700"/>
  </g>

  <!-- Top separator -->
  <rect x="100" y="10" width="700" height="1" fill="url(#divLine)"/>
  <rect x="445" y="8" width="10" height="5" fill="#00f0ff" filter="url(#glow)"/>

  <!-- Circuit traces -->
  <g opacity="0.5">
    <path d="M100,10 L80,10 L70,20" stroke="#00f0ff" stroke-width="1" fill="none" class="circuit"/>
    <path d="M800,10 L820,10 L830,20" stroke="#ffd700" stroke-width="1" fill="none" class="circuit" style="animation-delay:.5s"/>
  </g>

  <!-- Shimmer -->
  <rect class="shimmer-line" x="0" y="0" width="150" height="110" fill="url(#fadeGrad)" opacity="0.5"/>

  <!-- Quote -->
  <g class="f1">
    <text x="450" y="45" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-weight="900" font-size="14" fill="#00f0ff" font-style="italic" letter-spacing="1">
      "Every investigation teaches something. Every detection rule is a lesson documented."
    </text>
  </g>

  <g class="f2">
    <text x="450" y="68" text-anchor="middle" font-family="Consolas, monospace" font-size="10" font-weight="bold" fill="#e2e8f0" letter-spacing="1">
      Not chasing titles — building the discipline to <tspan fill="#ffd700">understand</tspan>, <tspan fill="#ff4757">detect</tspan>, and <tspan fill="#00f0ff">defend</tspan>.
    </text>
  </g>

  <!-- Session marker -->
  <g class="f3">
    <text x="450" y="95" text-anchor="middle" font-family="Consolas, monospace" font-size="8" font-weight="bold" fill="#6c5ce7" letter-spacing="4">
      SESSION://2026 // SEC_LEVEL:5_ENCRYPTED<tspan class="cursor" fill="#00f0ff"> █</tspan>
    </text>
  </g>
</svg>
