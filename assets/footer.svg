<svg viewBox="0 0 900 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050110"/>
      <stop offset="50%" stop-color="#0a0518"/>
      <stop offset="100%" stop-color="#020005"/>
    </linearGradient>

    <filter id="hyperGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <radialGradient id="nebula" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8e44ad" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#8e44ad" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700;900&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap');

    @keyframes pulseGlow { 0%, 100% { opacity: 0.8; filter: drop-shadow(0 0 5px #00f0ff); } 50% { opacity: 1; filter: drop-shadow(0 0 15px #00f0ff); } }
    @keyframes pulseGold { 0%, 100% { opacity: 0.8; filter: drop-shadow(0 0 5px #ffd700); } 50% { opacity: 1; filter: drop-shadow(0 0 15px #ffd700); } }

    .glow-cyan { animation: pulseGlow 3s infinite; }
    .glow-gold { animation: pulseGold 3s infinite 1.5s; }

    .font-sans { font-family: 'Rajdhani', sans-serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
  </style>

  <rect width="900" height="100" fill="url(#bg)"/>
  
  <ellipse cx="450" cy="50" rx="450" ry="50" fill="url(#nebula)"/>

  <!-- High-FX Border -->
  <line x1="200" y1="10" x2="700" y2="10" stroke="#8e44ad" stroke-width="2" filter="url(#hyperGlow)"/>
  <line x1="200" y1="10" x2="700" y2="10" stroke="#ffffff" stroke-width="0.5"/>

  <!-- Glowing Particles -->
  <circle cx="200" cy="10" r="3" fill="#00f0ff" filter="url(#hyperGlow)" class="glow-cyan"/>
  <circle cx="700" cy="10" r="3" fill="#ffd700" filter="url(#hyperGlow)" class="glow-gold"/>

  <text x="450" y="45" text-anchor="middle" class="font-sans" font-weight="900" font-size="12" fill="#00f0ff" letter-spacing="1" filter="url(#hyperGlow)" class="glow-cyan">
    "EVERY INVESTIGATION TEACHES SOMETHING. EVERY DETECTION RULE IS A LESSON DOCUMENTED."
  </text>

  <text x="450" y="75" text-anchor="middle" class="font-mono" font-weight="bold" font-size="10" fill="#ffd700" letter-spacing="1" filter="url(#hyperGlow)" class="glow-gold">
    NOT CHASING TITLES — BUILDING THE DISCIPLINE TO UNDERSTAND, DETECT, AND DEFEND.
  </text>
</svg>
