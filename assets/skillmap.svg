<svg viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06070d"/>
      <stop offset="100%" stop-color="#0b0e1a"/>
    </linearGradient>
    <linearGradient id="barGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b9d"/>
      <stop offset="100%" stop-color="#c44569"/>
    </linearGradient>
    <linearGradient id="barGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffd93d"/>
      <stop offset="100%" stop-color="#f0932b"/>
    </linearGradient>
    <linearGradient id="barGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4ecdc4"/>
      <stop offset="100%" stop-color="#2d98a6"/>
    </linearGradient>
    <linearGradient id="barGrad4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a29bfe"/>
      <stop offset="100%" stop-color="#6c5ce7"/>
    </linearGradient>
    <linearGradient id="barGrad5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#74b9ff"/>
      <stop offset="100%" stop-color="#0984e3"/>
    </linearGradient>
    <linearGradient id="barGrad6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fd79a8"/>
      <stop offset="100%" stop-color="#e84393"/>
    </linearGradient>
    <linearGradient id="divLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a29bfe" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a29bfe" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a29bfe" stop-opacity="0"/>
    </linearGradient>

  </defs>

  <style>
    @keyframes growBar {
      0% { width: 0; }
      100% { width: var(--target-width); }
    }
    @keyframes fadeIn {
      0% { opacity: 0; transform: translateX(-10px); }
      100% { opacity: 1; transform: translateX(0); }
    }
    @keyframes nodeFloat {
      0%, 100% { opacity: 0.3; r: 2; }
      50% { opacity: 0.8; r: 3; }
    }
    @keyframes dataPulse {
      0% { stroke-dashoffset: 20; }
      100% { stroke-dashoffset: 0; }
    }
    .row1 { animation: fadeIn 0.6s ease-out 0.2s both; }
    .row2 { animation: fadeIn 0.6s ease-out 0.35s both; }
    .row3 { animation: fadeIn 0.6s ease-out 0.5s both; }
    .row4 { animation: fadeIn 0.6s ease-out 0.65s both; }
    .row5 { animation: fadeIn 0.6s ease-out 0.8s both; }
    .row6 { animation: fadeIn 0.6s ease-out 0.95s both; }
    .skill-label {
      font-family: Consolas, monospace;
      font-size: 10px;
      letter-spacing: 1.5px;
    }
    .skill-sub {
      font-family: Consolas, monospace;
      font-size: 8px;
      fill: #3d4155;
    }
    .section-title {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 10px;
      letter-spacing: 4px;
      fill: #6c5ce7;
      opacity: 0.5;
    }
    .node { animation: nodeFloat 3s ease-in-out infinite; }
    .node2 { animation: nodeFloat 3s ease-in-out infinite 1s; }
    .node3 { animation: nodeFloat 3s ease-in-out infinite 2s; }
    .data-line {
      stroke-dasharray: 4 3;
      animation: dataPulse 2s linear infinite;
    }
  </style>

  <rect width="900" height="280" fill="url(#bg)"/>

  <!-- Background particles -->
  <circle cx="100" cy="40" r="0.6" fill="#a29bfe" class="node"/>
  <circle cx="250" cy="250" r="0.5" fill="#6c5ce7" class="node2"/>
  <circle cx="500" cy="30" r="0.7" fill="#c4b5fd" class="node3"/>
  <circle cx="800" cy="60" r="0.5" fill="#a29bfe" class="node"/>
  <circle cx="700" cy="250" r="0.6" fill="#6c5ce7" class="node2"/>

  <!-- Section header -->
  <text x="450" y="28" text-anchor="middle" class="section-title">CAPABILITY MATRIX</text>
  <rect x="150" y="35" width="600" height="0.5" fill="url(#divLine)"/>

  <!-- Row 1: DFIR -->
  <g class="row1">
    <text x="50" y="78" class="skill-label" fill="#ff6b9d">DFIR</text>
    <rect x="170" y="67" width="500" height="16" rx="2" fill="#0f1120" opacity="0.6"/>
    <rect x="170" y="67" width="400" height="16" rx="2" fill="url(#barGrad1)" opacity="0.8"/>
    <text x="175" y="78" class="skill-sub" fill="#0b0e1a" opacity="0.8">Evidence Acquisition · Timeline Analysis · Artifact Parsing · Memory Forensics</text>
    <text x="680" y="78" class="skill-label" fill="#3d4155">80%</text>
    <!-- Connection nodes -->
    <circle cx="740" cy="75" r="2" fill="#ff6b9d" class="node" opacity="0.5"/>
    <line x1="680" y1="75" x2="735" y2="75" stroke="#ff6b9d" stroke-width="0.3" opacity="0.2" class="data-line"/>
  </g>

  <!-- Row 2: Threat Hunting -->
  <g class="row2">
    <text x="50" y="116" class="skill-label" fill="#ffd93d">HUNT</text>
    <rect x="170" y="105" width="500" height="16" rx="2" fill="#0f1120" opacity="0.6"/>
    <rect x="170" y="105" width="375" height="16" rx="2" fill="url(#barGrad2)" opacity="0.8"/>
    <text x="175" y="116" class="skill-sub" fill="#0b0e1a" opacity="0.8">Hypothesis-Driven · MITRE ATT&amp;CK · Behavioral Analysis · Threat Intel</text>
    <text x="680" y="116" class="skill-label" fill="#3d4155">75%</text>
    <circle cx="740" cy="113" r="2" fill="#ffd93d" class="node2" opacity="0.5"/>
    <line x1="680" y1="113" x2="735" y2="113" stroke="#ffd93d" stroke-width="0.3" opacity="0.2" class="data-line"/>
  </g>

  <!-- Row 3: Detection -->
  <g class="row3">
    <text x="50" y="154" class="skill-label" fill="#4ecdc4">DETECT</text>
    <rect x="170" y="143" width="500" height="16" rx="2" fill="#0f1120" opacity="0.6"/>
    <rect x="170" y="143" width="350" height="16" rx="2" fill="url(#barGrad3)" opacity="0.8"/>
    <text x="175" y="154" class="skill-sub" fill="#0b0e1a" opacity="0.8">YARA Signatures · Sigma Rules · Log Correlation · ATT&amp;CK Coverage</text>
    <text x="680" y="154" class="skill-label" fill="#3d4155">70%</text>
    <circle cx="740" cy="151" r="2" fill="#4ecdc4" class="node3" opacity="0.5"/>
    <line x1="680" y1="151" x2="735" y2="151" stroke="#4ecdc4" stroke-width="0.3" opacity="0.2" class="data-line"/>
  </g>

  <!-- Row 4: SOC Ops -->
  <g class="row4">
    <text x="50" y="192" class="skill-label" fill="#a29bfe">SOCOPS</text>
    <rect x="170" y="181" width="500" height="16" rx="2" fill="#0f1120" opacity="0.6"/>
    <rect x="170" y="181" width="325" height="16" rx="2" fill="url(#barGrad4)" opacity="0.8"/>
    <text x="175" y="192" class="skill-sub" fill="#0b0e1a" opacity="0.8">SIEM · Alert Triage · Incident Response · Endpoint Monitoring</text>
    <text x="680" y="192" class="skill-label" fill="#3d4155">65%</text>
    <circle cx="740" cy="189" r="2" fill="#a29bfe" class="node" opacity="0.5"/>
    <line x1="680" y1="189" x2="735" y2="189" stroke="#a29bfe" stroke-width="0.3" opacity="0.2" class="data-line"/>
  </g>

  <!-- Row 5: Programming -->
  <g class="row5">
    <text x="50" y="230" class="skill-label" fill="#74b9ff">CODE</text>
    <rect x="170" y="219" width="500" height="16" rx="2" fill="#0f1120" opacity="0.6"/>
    <rect x="170" y="219" width="350" height="16" rx="2" fill="url(#barGrad5)" opacity="0.8"/>
    <text x="175" y="230" class="skill-sub" fill="#0b0e1a" opacity="0.8">Python · Bash · Automation · Log Parsers · Analysis Tools</text>
    <text x="680" y="230" class="skill-label" fill="#3d4155">70%</text>
    <circle cx="740" cy="227" r="2" fill="#74b9ff" class="node2" opacity="0.5"/>
    <line x1="680" y1="227" x2="735" y2="227" stroke="#74b9ff" stroke-width="0.3" opacity="0.2" class="data-line"/>
  </g>

  <!-- Row 6: Malware -->
  <g class="row6">
    <text x="50" y="268" class="skill-label" fill="#fd79a8">MALWARE</text>
    <rect x="170" y="257" width="500" height="16" rx="2" fill="#0f1120" opacity="0.6"/>
    <rect x="170" y="257" width="300" height="16" rx="2" fill="url(#barGrad6)" opacity="0.8"/>
    <text x="175" y="268" class="skill-sub" fill="#0b0e1a" opacity="0.8">Static Analysis · Dynamic Analysis · Behavioral Indicators · Sandboxing</text>
    <text x="680" y="268" class="skill-label" fill="#3d4155">60%</text>
    <circle cx="740" cy="265" r="2" fill="#fd79a8" class="node3" opacity="0.5"/>
    <line x1="680" y1="265" x2="735" y2="265" stroke="#fd79a8" stroke-width="0.3" opacity="0.2" class="data-line"/>
  </g>

  <!-- Right side: Connection network -->
  <g opacity="0.15">
    <line x1="740" y1="75" x2="740" y2="113" stroke="#a29bfe" stroke-width="0.5"/>
    <line x1="740" y1="113" x2="740" y2="151" stroke="#a29bfe" stroke-width="0.5"/>
    <line x1="740" y1="151" x2="740" y2="189" stroke="#a29bfe" stroke-width="0.5"/>
    <line x1="740" y1="189" x2="740" y2="227" stroke="#a29bfe" stroke-width="0.5"/>
    <line x1="740" y1="227" x2="740" y2="265" stroke="#a29bfe" stroke-width="0.5"/>
    <!-- Cross connections -->
    <line x1="740" y1="75" x2="770" y2="151" stroke="#ff6b9d" stroke-width="0.3"/>
    <line x1="740" y1="113" x2="770" y2="189" stroke="#ffd93d" stroke-width="0.3"/>
    <line x1="740" y1="151" x2="770" y2="227" stroke="#4ecdc4" stroke-width="0.3"/>
    <line x1="740" y1="75" x2="770" y2="265" stroke="#a29bfe" stroke-width="0.3"/>
  </g>

  <!-- Right side labels -->
  <g>
    <text x="780" y="120" font-family="Consolas, monospace" font-size="7" fill="#1e2035" letter-spacing="1">WINDOWS</text>
    <text x="780" y="132" font-family="Consolas, monospace" font-size="7" fill="#1e2035" letter-spacing="1">LINUX</text>
    <text x="780" y="170" font-family="Consolas, monospace" font-size="7" fill="#1e2035" letter-spacing="1">DOCKER</text>
    <text x="780" y="182" font-family="Consolas, monospace" font-size="7" fill="#1e2035" letter-spacing="1">KALI</text>
    <text x="780" y="220" font-family="Consolas, monospace" font-size="7" fill="#1e2035" letter-spacing="1">AUTOPSY</text>
    <text x="780" y="232" font-family="Consolas, monospace" font-size="7" fill="#1e2035" letter-spacing="1">GHIDRA</text>
  </g>
</svg>
