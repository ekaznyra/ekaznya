<svg viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes waveform {
      0% { d: path("M0,100 Q50,60 100,100 Q150,140 200,100 Q250,60 300,100 Q350,140 400,100 Q450,60 500,100 Q550,140 600,100 Q650,60 700,100 Q750,140 800,100 L800,200 L0,200 Z"); }
      50% { d: path("M0,100 Q50,140 100,100 Q150,60 200,100 Q250,140 300,100 Q350,60 400,100 Q450,140 500,100 Q550,60 600,100 Q650,140 700,100 Q750,60 800,100 L800,200 L0,200 Z"); }
      100% { d: path("M0,100 Q50,60 100,100 Q150,140 200,100 Q250,60 300,100 Q350,140 400,100 Q450,60 500,100 Q550,140 600,100 Q650,60 700,100 Q750,140 800,100 L800,200 L0,200 Z"); }
    }
    @keyframes nodeGlow {
      0%, 100% { opacity: 0.3; r: 3; }
      50% { opacity: 1; r: 5; }
    }
    @keyframes signalPulse {
      0% { stroke-dashoffset: 1000; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes scanHoriz {
      0% { transform: translateX(-900px); }
      100% { transform: translateX(900px); }
    }
    .skill-label {
      font-family: 'Courier New', monospace;
      font-size: 10px;
      fill: #8b949e;
    }
    .skill-value {
      font-family: 'Courier New', monospace;
      font-size: 9px;
      fill: #00ff41;
    }
    .section-line {
      stroke: #1b2332;
      stroke-width: 1;
    }
    .node-active { animation: nodeGlow 3s ease-in-out infinite; }
    .node-active2 { animation: nodeGlow 3s ease-in-out infinite 1s; }
    .node-active3 { animation: nodeGlow 3s ease-in-out infinite 2s; }
    .signal-path {
      stroke-dasharray: 8 4;
      animation: signalPulse 15s linear infinite;
    }
    .scan-line {
      animation: scanHoriz 8s linear infinite;
    }
  </style>

  <rect width="900" height="200" fill="#0a0e17"/>
  
  <!-- Background grid -->
  <g opacity="0.03" stroke="#00ff41" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="200"/><line x1="30" y1="0" x2="30" y2="200"/>
    <line x1="60" y1="0" x2="60" y2="200"/><line x1="90" y1="0" x2="90" y2="200"/>
    <line x1="120" y1="0" x2="120" y2="200"/><line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="180" y1="0" x2="180" y2="200"/><line x1="210" y1="0" x2="210" y2="200"/>
    <line x1="240" y1="0" x2="240" y2="200"/><line x1="270" y1="0" x2="270" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/><line x1="330" y1="0" x2="330" y2="200"/>
    <line x1="360" y1="0" x2="360" y2="200"/><line x1="390" y1="0" x2="390" y2="200"/>
    <line x1="420" y1="0" x2="420" y2="200"/><line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="480" y1="0" x2="480" y2="200"/><line x1="510" y1="0" x2="510" y2="200"/>
    <line x1="540" y1="0" x2="540" y2="200"/><line x1="570" y1="0" x2="570" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/><line x1="630" y1="0" x2="630" y2="200"/>
    <line x1="660" y1="0" x2="660" y2="200"/><line x1="690" y1="0" x2="690" y2="200"/>
    <line x1="720" y1="0" x2="720" y2="200"/><line x1="750" y1="0" x2="750" y2="200"/>
    <line x1="780" y1="0" x2="780" y2="200"/><line x1="810" y1="0" x2="810" y2="200"/>
    <line x1="840" y1="0" x2="840" y2="200"/><line x1="870" y1="0" x2="870" y2="200"/>
    <line x1="0" y1="30" x2="900" y2="30"/><line x1="0" y1="60" x2="900" y2="60"/>
    <line x1="0" y1="90" x2="900" y2="90"/><line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="150" x2="900" y2="150"/><line x1="0" y1="180" x2="900" y2="180"/>
  </g>

  <!-- Scan line -->
  <rect class="scan-line" x="0" y="0" width="3" height="200" fill="#00ff41" opacity="0.06"/>

  <!-- Network topology visualization -->
  <!-- Central hub -->
  <circle cx="450" cy="100" r="8" fill="#0a0e17" stroke="#00ff41" stroke-width="2"/>
  <circle cx="450" cy="100" r="3" fill="#00ff41" class="node-active"/>
  <text x="450" y="80" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#3a4553">CORE</text>
  
  <!-- DFIR node -->
  <line x1="450" y1="100" x2="120" y2="50" stroke="#ff6b6b" stroke-width="0.5" opacity="0.4" class="signal-path"/>
  <circle cx="120" cy="50" r="5" fill="#0a0e17" stroke="#ff6b6b" stroke-width="1.5"/>
  <circle cx="120" cy="50" r="2" fill="#ff6b6b" class="node-active"/>
  <text x="120" y="38" text-anchor="middle" class="skill-label" fill="#ff6b6b">DFIR</text>
  <text x="120" y="68" text-anchor="middle" class="skill-value">Forensics · Timeline · Artifacts</text>
  
  <!-- Threat Hunting node -->
  <line x1="450" y1="100" x2="260" y2="40" stroke="#ffd93d" stroke-width="0.5" opacity="0.4" class="signal-path"/>
  <circle cx="260" cy="40" r="5" fill="#0a0e17" stroke="#ffd93d" stroke-width="1.5"/>
  <circle cx="260" cy="40" r="2" fill="#ffd93d" class="node-active2"/>
  <text x="260" y="28" text-anchor="middle" class="skill-label" fill="#ffd93d">THREAT HUNT</text>
  <text x="260" y="58" text-anchor="middle" class="skill-value">Hypothesis · MITRE · Behavior</text>

  <!-- Detection Engineering node -->
  <line x1="450" y1="100" x2="640" y2="40" stroke="#6bcb77" stroke-width="0.5" opacity="0.4" class="signal-path"/>
  <circle cx="640" cy="40" r="5" fill="#0a0e17" stroke="#6bcb77" stroke-width="1.5"/>
  <circle cx="640" cy="40" r="2" fill="#6bcb77" class="node-active3"/>
  <text x="640" y="28" text-anchor="middle" class="skill-label" fill="#6bcb77">DETECTION ENG</text>
  <text x="640" y="58" text-anchor="middle" class="skill-value">YARA · Sigma · Rules</text>

  <!-- SOC Ops node -->
  <line x1="450" y1="100" x2="780" y2="50" stroke="#4d96ff" stroke-width="0.5" opacity="0.4" class="signal-path"/>
  <circle cx="780" cy="50" r="5" fill="#0a0e17" stroke="#4d96ff" stroke-width="1.5"/>
  <circle cx="780" cy="50" r="2" fill="#4d96ff" class="node-active"/>
  <text x="780" y="38" text-anchor="middle" class="skill-label" fill="#4d96ff">SOC OPS</text>
  <text x="780" y="68" text-anchor="middle" class="skill-value">SIEM · Triage · Response</text>

  <!-- Malware Analysis node -->
  <line x1="450" y1="100" x2="180" y2="155" stroke="#9b72cf" stroke-width="0.5" opacity="0.4" class="signal-path"/>
  <circle cx="180" cy="155" r="5" fill="#0a0e17" stroke="#9b72cf" stroke-width="1.5"/>
  <circle cx="180" cy="155" r="2" fill="#9b72cf" class="node-active2"/>
  <text x="180" y="175" text-anchor="middle" class="skill-label" fill="#9b72cf">MALWARE LAB</text>
  <text x="180" y="143" text-anchor="middle" class="skill-value">Static · Dynamic · Evasion</text>

  <!-- Network Forensics node -->
  <line x1="450" y1="100" x2="360" y2="165" stroke="#e8590c" stroke-width="0.5" opacity="0.4" class="signal-path"/>
  <circle cx="360" cy="165" r="5" fill="#0a0e17" stroke="#e8590c" stroke-width="1.5"/>
  <circle cx="360" cy="165" r="2" fill="#e8590c" class="node-active3"/>
  <text x="360" y="185" text-anchor="middle" class="skill-label" fill="#e8590c">NET FORENSICS</text>
  <text x="360" y="153" text-anchor="middle" class="skill-value">Packets · C2 · DNS</text>
  
  <!-- Log Analysis node -->
  <line x1="450" y1="100" x2="540" y2="165" stroke="#20c997" stroke-width="0.5" opacity="0.4" class="signal-path"/>
  <circle cx="540" cy="165" r="5" fill="#0a0e17" stroke="#20c997" stroke-width="1.5"/>
  <circle cx="540" cy="165" r="2" fill="#20c997" class="node-active"/>
  <text x="540" y="185" text-anchor="middle" class="skill-label" fill="#20c997">LOG ANALYSIS</text>
  <text x="540" y="153" text-anchor="middle" class="skill-value">EventLog · Sysmon · Audit</text>

  <!-- Programming node -->
  <line x1="450" y1="100" x2="720" y2="160" stroke="#f59f00" stroke-width="0.5" opacity="0.4" class="signal-path"/>
  <circle cx="720" cy="160" r="5" fill="#0a0e17" stroke="#f59f00" stroke-width="1.5"/>
  <circle cx="720" cy="160" r="2" fill="#f59f00" class="node-active2"/>
  <text x="720" y="180" text-anchor="middle" class="skill-label" fill="#f59f00">PROGRAMMING</text>
  <text x="720" y="148" text-anchor="middle" class="skill-value">Python · Bash · Automation</text>

  <!-- Cross connections (showing skill interconnections) -->
  <line x1="120" y1="50" x2="180" y2="155" stroke="#1b2332" stroke-width="0.3" stroke-dasharray="3 3"/>
  <line x1="260" y1="40" x2="640" y2="40" stroke="#1b2332" stroke-width="0.3" stroke-dasharray="3 3"/>
  <line x1="360" y1="165" x2="540" y2="165" stroke="#1b2332" stroke-width="0.3" stroke-dasharray="3 3"/>
  <line x1="780" y1="50" x2="720" y2="160" stroke="#1b2332" stroke-width="0.3" stroke-dasharray="3 3"/>
</svg>
