<svg viewBox="0 0 900 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="50%" stop-color="#050505"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    @keyframes slowSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes beam { 0% { stroke-dashoffset: 700; } 100% { stroke-dashoffset: 0; } }

    .spin { transform-origin: center; animation: slowSpin 10s linear infinite; }
    .energy-beam { stroke-dasharray: 50 700; animation: beam 3s linear infinite; }

    .font-sans { font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, "Helvetica Neue", Arial, sans-serif; }
    .font-mono { font-family: Consolas, "SFMono-Regular", Menlo, Monaco, "Liberation Mono", monospace; }
  </style>

  <rect width="900" height="90" fill="url(#bg)"/>

  <!-- Minimal Line -->
  <line x1="100" y1="45" x2="800" y2="45" stroke="#111111" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="100" y1="45" x2="800" y2="45" stroke="#ffffff" stroke-width="1.5" class="energy-beam" filter="url(#softGlow)" opacity="0.5"/>

  <!-- ProtonMail -->
  <g>
    <rect x="197" y="42" width="6" height="6" fill="#000000" stroke="#e0e0e0" stroke-width="1" transform="rotate(45 200 45)"/>
    <text x="200" y="25" text-anchor="middle" class="font-sans" font-weight="600" font-size="11" fill="#e0e0e0" letter-spacing="2">PROTONMAIL</text>
    <text x="200" y="70" text-anchor="middle" class="font-mono" font-size="10" font-weight="normal" fill="#a9a9a9">anhtunguyen.sec</text>
  </g>

  <!-- Telegram -->
  <g>
    <rect x="363" y="42" width="6" height="6" fill="#000000" stroke="#a9a9a9" stroke-width="1" transform="rotate(45 366 45)"/>
    <text x="366" y="25" text-anchor="middle" class="font-sans" font-weight="600" font-size="11" fill="#a9a9a9" letter-spacing="2">TELEGRAM</text>
    <text x="366" y="70" text-anchor="middle" class="font-mono" font-size="10" font-weight="normal" fill="#777777">@ekaznya</text>
  </g>

  <!-- GitHub -->
  <g>
    <rect x="530" y="42" width="6" height="6" fill="#000000" stroke="#d4af37" stroke-width="1.5" transform="rotate(45 533 45)" filter="url(#softGlow)"/>
    <circle cx="533" cy="45" r="8" fill="none" stroke="#d4af37" stroke-width="0.5" stroke-dasharray="2 2" class="spin"/>
    <text x="533" y="25" text-anchor="middle" class="font-sans" font-weight="800" font-size="11" fill="#d4af37" letter-spacing="2" filter="url(#softGlow)">GITHUB</text>
    <text x="533" y="70" text-anchor="middle" class="font-mono" font-size="10" font-weight="normal" fill="#ffffff">ekaznyra</text>
  </g>

  <!-- LinkedIn -->
  <g>
    <rect x="697" y="42" width="6" height="6" fill="#000000" stroke="#e0e0e0" stroke-width="1" transform="rotate(45 700 45)"/>
    <text x="700" y="25" text-anchor="middle" class="font-sans" font-weight="600" font-size="11" fill="#e0e0e0" letter-spacing="2">LINKEDIN</text>
    <text x="700" y="70" text-anchor="middle" class="font-mono" font-size="10" font-weight="normal" fill="#a9a9a9">Connect</text>
  </g>

</svg>
