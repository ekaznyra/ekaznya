<svg viewBox="0 0 900 90" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050110"/>
      <stop offset="50%" stop-color="#0a0518"/>
      <stop offset="100%" stop-color="#020005"/>
    </linearGradient>

    <filter id="hyperGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    @keyframes pulseGlow { 0%, 100% { filter: drop-shadow(0 0 5px #00f0ff); opacity: 0.8; } 50% { filter: drop-shadow(0 0 20px #00f0ff); opacity: 1; } }
    @keyframes fastSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes beam { 0% { stroke-dashoffset: 700; } 100% { stroke-dashoffset: 0; } }

    .node-pulse { animation: pulseGlow 1.5s infinite; }
    .spin { transform-origin: center; animation: fastSpin 2s linear infinite; }
    .energy-beam { stroke-dasharray: 50 700; animation: beam 1.5s linear infinite; }

    .font-sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    .font-mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; }
  </style>

  <rect width="900" height="90" fill="url(#bg)"/>

  <!-- High-FX Line -->
  <line x1="100" y1="45" x2="800" y2="45" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="45" x2="800" y2="45" stroke="#00f0ff" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
  <line x1="100" y1="45" x2="800" y2="45" stroke="#ffffff" stroke-width="4" class="energy-beam" filter="url(#hyperGlow)"/>

  <!-- ProtonMail -->
  <g>
    <circle cx="200" cy="45" r="5" fill="#000000" stroke="#00f0ff" stroke-width="3" filter="url(#hyperGlow)"/>
    <g transform="translate(200,45)"><polygon points="0,-8 2,-2 8,0 2,2 0,8 -2,2 -8,0 -2,-2" fill="#ffffff" class="spin"/></g>
    <text x="200" y="25" text-anchor="middle" class="font-sans" font-weight="900" font-size="12" fill="#00f0ff" letter-spacing="2" filter="url(#hyperGlow)">PROTONMAIL</text>
    <text x="200" y="70" text-anchor="middle" class="font-mono" font-size="10" font-weight="bold" fill="#ffffff">anhtunguyen.sec</text>
  </g>

  <!-- Telegram -->
  <g>
    <circle cx="366" cy="45" r="5" fill="#000000" stroke="#8e44ad" stroke-width="3" filter="url(#hyperGlow)"/>
    <g transform="translate(366,45)"><polygon points="0,-8 2,-2 8,0 2,2 0,8 -2,2 -8,0 -2,-2" fill="#ffffff" class="spin"/></g>
    <text x="366" y="25" text-anchor="middle" class="font-sans" font-weight="900" font-size="12" fill="#8e44ad" letter-spacing="2" filter="url(#hyperGlow)">TELEGRAM</text>
    <text x="366" y="70" text-anchor="middle" class="font-mono" font-size="10" font-weight="bold" fill="#ffffff">@ekaznya</text>
  </g>

  <!-- GitHub -->
  <g>
    <circle cx="533" cy="45" r="5" fill="#000000" stroke="#ffd700" stroke-width="3" filter="url(#hyperGlow)"/>
    <circle cx="533" cy="45" r="8" fill="none" stroke="#ffd700" stroke-width="1.5" stroke-dasharray="4 2" class="spin"/>
    <g transform="translate(533,45)"><polygon points="0,-8 2,-2 8,0 2,2 0,8 -2,2 -8,0 -2,-2" fill="#ffffff" class="spin"/></g>
    <text x="533" y="25" text-anchor="middle" class="font-sans" font-weight="900" font-size="12" fill="#ffd700" letter-spacing="2" filter="url(#hyperGlow)">GITHUB</text>
    <text x="533" y="70" text-anchor="middle" class="font-mono" font-size="10" font-weight="bold" fill="#ffffff">ekaznyra</text>
  </g>

  <!-- LinkedIn -->
  <g>
    <circle cx="700" cy="45" r="5" fill="#000000" stroke="#00f0ff" stroke-width="3" filter="url(#hyperGlow)"/>
    <g transform="translate(700,45)"><polygon points="0,-8 2,-2 8,0 2,2 0,8 -2,2 -8,0 -2,-2" fill="#ffffff" class="spin"/></g>
    <text x="700" y="25" text-anchor="middle" class="font-sans" font-weight="900" font-size="12" fill="#00f0ff" letter-spacing="2" filter="url(#hyperGlow)">LINKEDIN</text>
    <text x="700" y="70" text-anchor="middle" class="font-mono" font-size="10" font-weight="bold" fill="#ffffff">Connect</text>
  </g>

</svg>
